<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .calendar-day {
      min-height: 120px;
      background: var(--bg-surface);
      padding: 8px;
      transition: background 0.2s;
    }
    .calendar-day:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .calendar-day.not-current {
      opacity: 0.3;
      background: transparent;
    }
    .calendar-day.today {
      border: 1px solid var(--color-cyan);
      box-shadow: inset 0 0 10px rgba(0, 245, 255, 0.1);
    }
    .event-pill {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: var(--color-magenta);
      color: white;
      cursor: pointer;
    }
    .event-pill:hover {
      filter: brightness(1.2);
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="app-header"></div>

  <main class="pt-24 pb-12 max-w-7xl mx-auto px-4">
    <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-black text-white flex items-center gap-3">
          <i class="fas fa-calendar-alt text-cyan-400"></i> Calendario Comunidad
        </h1>
      </div>
      <div class="flex items-center gap-4 bg-black/40 p-2 rounded-2xl border border-white/10">
        <button onclick="prevMonth()" class="w-10 h-10 rounded-xl hover:bg-white/10 text-white transition-all"><i class="fas fa-chevron-left"></i></button>
        <span id="current-month-year" class="text-lg font-bold text-[var(--color-cyan)] min-w-[150px] text-center">Marzo 2026</span>
        <button onclick="nextMonth()" class="w-10 h-10 rounded-xl hover:bg-white/10 text-white transition-all"><i class="fas fa-chevron-right"></i></button>
      </div>
      <a href="create.html" class="btn-primary px-6 py-2 rounded-xl text-sm"><i class="fas fa-plus mr-2"></i>Nuevo Evento</a>
    </div>

    <!-- Calendar Grid -->
    <div class="rounded-3xl overflow-hidden shadow-2xl shadow-cyan-500/5">
      <div class="grid grid-cols-7 bg-black/40 border-x border-t border-white/10">
        <div class="text-center py-4 text-xs font-bold uppercase tracking-widest text-gray-500">Dom</div>
        <div class="text-center py-4 text-xs font-bold uppercase tracking-widest text-gray-500">Lun</div>
        <div class="text-center py-4 text-xs font-bold uppercase tracking-widest text-gray-500">Mar</div>
        <div class="text-center py-4 text-xs font-bold uppercase tracking-widest text-gray-500">Mié</div>
        <div class="text-center py-4 text-xs font-bold uppercase tracking-widest text-gray-500">Jue</div>
        <div class="text-center py-4 text-xs font-bold uppercase tracking-widest text-gray-500">Vie</div>
        <div class="text-center py-4 text-xs font-bold uppercase tracking-widest text-gray-500">Sáb</div>
      </div>
      <div id="calendar-body" class="calendar-grid border border-white/10">
        <!-- JS will populate this -->
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script>
    let currentDate = new Date();
    let events = [];

    document.addEventListener('DOMContentLoaded', async () => {
      await loadEvents();
      renderCalendar();
    });

    async function loadEvents() {
      try {
        const res = await fetch(CONFIG.API_URL + '/eventos');
        events = await res.json();
      } catch (err) {
        console.error('Error loading events:', err);
      }
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('current-month-year').innerText = new Intl.DateTimeFormat('es-AR', { month: 'long', year: 'numeric' }).format(currentDate).toUpperCase();

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthLastDay = new Date(year, month, 0).getDate();

      const body = document.getElementById('calendar-body');
      body.innerHTML = '';

      // Previous month days
      for (let i = firstDay; i > 0; i--) {
        body.innerHTML += `<div class="calendar-day not-current"><span class="text-xs text-gray-700">${prevMonthLastDay - i + 1}</span></div>`;
      }

      // Current month days
      const today = new Date();
      for (let i = 1; i <= daysInMonth; i++) {
        const isToday = i === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        
        const dayEvents = events.filter(e => e.date.startsWith(dateStr));

        body.innerHTML += `
          <div class="calendar-day ${isToday ? 'today' : ''}">
            <span class="text-xs font-bold ${isToday ? 'text-cyan-400' : 'text-gray-500'}">${i}</span>
            <div class="mt-2">
              ${dayEvents.map(e => `<div class="event-pill" onclick="showEvent('${e._id}')">${e.title}</div>`).join('')}
            </div>
          </div>
        `;
      }

      // Next month days (fill the grid)
      const currentGridCells = firstDay + daysInMonth;
      const totalCells = Math.ceil(currentGridCells / 7) * 7;
      for (let i = 1; i <= (totalCells - currentGridCells); i++) {
        body.innerHTML += `<div class="calendar-day not-current"><span class="text-xs text-gray-700">${i}</span></div>`;
      }
    }

    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    function showEvent(id) {
      window.open(`evento.html?id=${id}`, '_blank');
    }

    function closeModal() {
      const modal = document.getElementById('event-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
  </script>
</body>
</html>
