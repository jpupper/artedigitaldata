<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</head>
<body class="min-h-screen flex flex-col">
  <script>showRegister();</script>
  <div id="app-header"></div>

  <main class="flex-1 flex items-center justify-center pt-20 pb-10 px-4">
    <div class="w-full max-w-md rounded-2xl p-8 border border-cyan-500/20 card-cyber">
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center font-black text-2xl mb-4">
          <img src="img/artedigital.png" alt="Logo" class="w-full h-full object-cover rounded-xl">
        </div>
        <h1 class="text-2xl font-bold text-white">Crear Cuenta</h1>
        <p class="text-gray-400 text-sm mt-2">Unite a la comunidad de Arte Digital</p>
      </div>

      <form id="register-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Username</label>
          <input type="text" id="reg-username" required
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-[var(--color-cyan)] focus:outline-none transition-colors"
            placeholder="tu_nombre_artístico">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
          <input type="email" id="reg-email" required
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-[var(--color-cyan)] focus:outline-none transition-colors"
            placeholder="tu@email.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Contraseña</label>
          <input type="password" id="reg-pass" required minlength="6"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-[var(--color-cyan)] focus:outline-none transition-colors"
            placeholder="Mínimo 6 caracteres">
        </div>
        <div id="reg-error" class="hidden text-red-400 text-sm text-center bg-red-500/10 rounded-lg p-3"></div>
        <button type="submit" class="btn-primary w-full py-3 rounded-xl transition-all hover:scale-[1.02]">
          <i class="fas fa-user-plus mr-2"></i>Crear Cuenta
        </button>
      </form>

      <p class="text-center text-gray-500 text-sm mt-6">
        ¿Ya tenés cuenta?
        <a href="login.html" class="text-[var(--color-cyan)] hover:text-[var(--color-magenta)] font-medium">Iniciá sesión</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = CONFIG.BASE + '/';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('reg-error');
      errorEl.classList.add('hidden');

      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-pass').value;

      try {
        const res = await fetch(CONFIG.API_URL + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Error al registrarse';
          errorEl.classList.remove('hidden');
          return;
        }

        setToken(data.token);
        setUser(data.user);
        window.location.href = CONFIG.BASE + '/';
      } catch {
        errorEl.textContent = 'Error de conexión con el servidor';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
