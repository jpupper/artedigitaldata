<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Acantilado | Arte Digital Data</title>
    <meta name="description" content="Llegaste a un acantilado, no hay nada acá. Página no encontrada.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3e00;
            --bg: #0a0a0c;
            --text: #ffffff;
            --accent: #4f46e5;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #ccc;
        }

        #game-container {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .btn-home {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(255, 62, 0, 0.4);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(255, 62, 0, 0.6);
            background: #ff5722;
        }

        /* Ambient background */
        .ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
        }

        .instructions {
            font-size: 0.8rem;
            color: #666;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="ambient"></div>
    
    <div class="container">
        <h1>404</h1>
        <p>"Llegaste a un acantilado, no hay nada acá"</p>
        
        <div id="game-container">
            <!-- p5.js canvas will be here -->
        </div>

        <a href="/" class="btn-home">Volver al Inicio</a>
        <div class="instructions">Usa las flechas ← → para manejar el cuatriciclo</div>
    </div>

    <script>
        let road = [];
        let carX = 0;
        let speed = 8;
        let score = 0;
        let gameActive = true;
        let horizon = 0;
        let roadWidth = 220;
        let totalSegments = 45;
        let curve = 0;
        let targetCurve = 0;
        let curveTimer = 0;
        let particles = [];

        function setup() {
            let container = document.getElementById('game-container');
            let w = container.offsetWidth;
            let h = container.offsetHeight;
            let canvas = createCanvas(w, h);
            canvas.parent('game-container');
            
            horizon = height * 0.45;
            
            for (let i = 0; i < totalSegments; i++) {
                road.push({
                    x: 0,
                    w: roadWidth,
                    color: i % 2 === 0 ? '#1f1f1f' : '#2a2a2a',
                    rumble: i % 2 === 0 ? '#ff3e00' : '#fff'
                });
            }
        }

        function draw() {
            if (!gameActive) {
                background(0, 200);
                fill(255);
                noStroke();
                textSize(32);
                textAlign(CENTER, CENTER);
                text("¡TE CAÍSTE!", width / 2, height / 2 - 20);
                textSize(16);
                fill(200);
                text("Presiona R para reintentar", width / 2, height / 2 + 30);
                
                // Update and draw particles
                updateParticles();
                return;
            }

            // Sky Gradient
            for(let i=0; i<horizon; i++) {
                let inter = map(i, 0, horizon, 0, 1);
                let c = lerpColor(color(10, 10, 30), color(40, 20, 60), inter);
                stroke(c);
                line(0, i, width, i);
            }
            
            // Cliff / Abyss background
            noStroke();
            fill(5, 5, 10);
            rect(0, horizon, width, height - horizon);

            // Procedural Curve Logic
            curveTimer--;
            if (curveTimer <= 0) {
                targetCurve = random(-5, 5);
                curveTimer = random(40, 120);
            }
            curve = lerp(curve, targetCurve, 0.04);

            // Update Road
            let first = road.shift();
            first.x = road[road.length-1].x + curve;
            road.push(first);

            // Render Road (Back to front)
            for (let i = road.length - 1; i >= 0; i--) {
                let segment = road[i];
                let z = i;
                let perspective = 1 / (z * 0.15 + 1);
                
                let y = horizon + (height - horizon) * (1 - perspective);
                let nextPerspective = 1 / ((z-1) * 0.15 + 1);
                let nextY = horizon + (height - horizon) * (1 - nextPerspective);
                
                let w = roadWidth * perspective;
                let x = width/2 + segment.x * perspective;
                
                let nextW = roadWidth * nextPerspective;
                let nextX = width/2 + (road[i-1] ? road[i-1].x : segment.x) * nextPerspective;

                // Draw Cliff Depth
                fill(15, 10, 20);
                beginShape();
                vertex(x - w, y);
                vertex(x - w, y + 100);
                vertex(nextX - nextW, nextY + 100);
                vertex(nextX - nextW, nextY);
                endShape(CLOSE);
                
                beginShape();
                vertex(x + w, y);
                vertex(x + w, y + 100);
                vertex(nextX + nextW, nextY + 100);
                vertex(nextX + nextW, nextY);
                endShape(CLOSE);

                // Draw road segment
                fill(segment.color);
                beginShape();
                vertex(x - w, y);
                vertex(x + w, y);
                vertex(nextX + nextW, nextY);
                vertex(nextX - nextW, nextY);
                endShape(CLOSE);

                // Rumble strips (red/white)
                fill(segment.rumble);
                rect(x - w - 5 * perspective, y, 5 * perspective, nextY - y);
                rect(x + w, y, 5 * perspective, nextY - y);

                // Center lines
                if (i % 4 < 2) {
                    fill(255, 100);
                    rect(x - 1, y, 2, nextY - y);
                }
            }

            // ATV Control
            let moveSpeed = 7;
            if (keyIsDown(LEFT_ARROW)) carX -= moveSpeed;
            if (keyIsDown(RIGHT_ARROW)) carX += moveSpeed;
            
            // Smoothly move road towards player offset
            // We want the road to curve relative to player
            // But here we keep player relative to road
            
            // Player ATV
            push();
            let playerY = height - 60;
            translate(width/2 + carX, playerY);
            
            // Sway animation
            let sway = sin(frameCount * 0.2) * 2;
            translate(0, sway);

            // Shadow
            fill(0, 150);
            noStroke();
            ellipse(0, 15, 70, 25);
            
            // ATV Wheels (Chunky)
            fill(10);
            rect(-30, 0, 18, 28, 6); // RL
            rect(12, 0, 18, 28, 6);  // RR
            rect(-28, -35, 16, 22, 6); // FL
            rect(12, -35, 16, 22, 6);  // FR
            
            // Body
            fill(255, 62, 0); // Primary color
            rect(-18, -25, 36, 40, 10);
            fill(30);
            rect(-12, -10, 24, 20, 5); // Seat
            
            // Engine/Details
            fill(60);
            rect(-8, 5, 16, 8, 2);
            
            // Handlebars
            stroke(100);
            strokeWeight(4);
            line(-22, -22, 22, -22);
            noStroke();
            fill(10);
            rect(-25, -25, 8, 6, 2); // Left grip
            rect(17, -25, 8, 6, 2);  // Right grip
            
            pop();

            // Collision Detection
            let currentRoadX = road[0].x;
            if (abs(carX - currentRoadX) > roadWidth + 5) {
                gameOver();
            }

            score += speed;
            fill(255);
            noStroke();
            textSize(18);
            textAlign(LEFT);
            text("Distancia: " + floor(score/10) + "m", 25, 40);
            
            // Speed effect particles
            if (frameCount % 2 === 0) {
                particles.push({
                    x: random(width),
                    y: horizon,
                    vy: random(2, 5),
                    life: 255
                });
            }
            updateParticles();
        }

        function gameOver() {
            gameActive = false;
            // Create explosion particles
            for(let i=0; i<30; i++) {
                particles.push({
                    x: width/2 + carX,
                    y: height - 60,
                    vx: random(-5, 5),
                    vy: random(-10, 2),
                    life: 255,
                    c: color(255, random(100, 200), 0)
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if (gameActive) {
                    // Speed lines
                    stroke(255, p.life * 0.2);
                    line(p.x, p.y, p.x, p.y + p.vy * 5);
                    p.y += p.vy * 2;
                } else {
                    // Explosion
                    noStroke();
                    fill(p.c.levels[0], p.c.levels[1], p.c.levels[2], p.life);
                    circle(p.x, p.y, 5);
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.2; // Gravity
                }
                p.life -= 5;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function keyPressed() {
            if (key === 'r' || key === 'R') {
                if (!gameActive) {
                    gameActive = true;
                    carX = 0;
                    score = 0;
                    road = [];
                    particles = [];
                    for (let i = 0; i < totalSegments; i++) {
                        road.push({
                            x: 0,
                            w: roadWidth,
                            color: i % 2 === 0 ? '#1f1f1f' : '#2a2a2a',
                            rumble: i % 2 === 0 ? '#ff3e00' : '#fff'
                        });
                    }
                }
            }
        }

        function windowResized() {
            let container = document.getElementById('game-container');
            resizeCanvas(container.offsetWidth, container.offsetHeight);
        }
    </script>
</body>
</html>
