<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Acantilado | Arte Digital Data</title>
    <meta name="description" content="Llegaste a un acantilado, no hay nada acá. Página no encontrada.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0D0D12;
            --bg-surface: #1A1A2E;
            --color-cyan: #00F5FF;
            --color-magenta: #FF00E0;
            --color-text: #E5E5E5;
            --color-text-dim: #94A3B8;
            --gradient-neon: linear-gradient(135deg, var(--color-cyan), var(--color-magenta));
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--color-text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 2rem;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            max-width: 600px;
            width: 95%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: var(--gradient-neon);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 10px rgba(0, 245, 255, 0.3));
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: var(--color-text-dim);
        }

        #game-container {
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid var(--color-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.1);
            position: relative;
        }

        .btn-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--gradient-neon);
            color: var(--bg-base) !important;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(0, 245, 255, 0.4);
        }

        .btn-home:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 15px 30px -5px rgba(255, 0, 224, 0.5);
            filter: brightness(1.2);
        }

        .instructions {
            font-size: 0.8rem;
            color: var(--color-text-dim);
            margin-top: 1.5rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>"Llegaste a un acantilado, no hay nada acá"</p>
        
        <div id="game-container"></div>

        <a href="/" class="btn-home">Volver al Inicio</a>
        <div class="instructions">Usa las flechas ← → para manejar el cuatriciclo</div>
    </div>

    <script>
        let segments = [];
        let playerX = 0; 
        let roadWidth = 220;
        let speed = 8;
        let score = 0;
        let gameActive = true;
        let horizon = 0;
        let totalSegments = 60;
        let curve = 0;
        let targetCurve = 0;
        let curveTimer = 0;
        let particles = [];

        function setup() {
            let container = document.getElementById('game-container');
            let canvas = createCanvas(container.offsetWidth, container.offsetHeight);
            canvas.parent('game-container');
            
            horizon = height * 0.45;
            playerX = width / 2;
            
            for (let i = 0; i < totalSegments; i++) {
                segments.push({
                    x: width / 2, 
                    w: roadWidth,
                    color: i % 4 < 2 ? '#111' : '#1a1a1a',
                    rumble: i % 4 < 2 ? '#ff00e0' : '#00f5ff'
                });
            }
        }

        function draw() {
            if (!gameActive) {
                background(13, 13, 18, 220);
                fill(255);
                noStroke();
                textSize(32);
                textAlign(CENTER, CENTER);
                text("¡TE CAÍSTE!", width / 2, height / 2 - 20);
                textSize(16);
                fill(148, 163, 184);
                text("Presiona R para reintentar", width / 2, height / 2 + 30);
                updateParticles();
                return;
            }

            // Sky
            background(13, 13, 18);
            noStroke();
            for(let i=0; i<horizon; i++) {
                let inter = map(i, 0, horizon, 0, 1);
                let c = lerpColor(color(10, 10, 20), color(26, 26, 46), inter);
                stroke(c);
                line(0, i, width, i);
            }
            
            // Abyss
            noStroke();
            fill(5, 5, 8);
            rect(0, horizon, width, height - horizon);

            // Road Logic
            curveTimer--;
            if (curveTimer <= 0) {
                targetCurve = random(-5, 5);
                curveTimer = random(40, 100);
            }
            curve = lerp(curve, targetCurve, 0.04);

            let lastX = segments[segments.length - 1].x;
            let newX = lastX + curve;
            newX = constrain(newX, width * 0.1, width * 0.9);
            
            segments.shift();
            segments.push({
                x: newX,
                w: roadWidth,
                color: frameCount % 8 < 4 ? '#111' : '#1a1a1a',
                rumble: frameCount % 8 < 4 ? '#ff00e0' : '#00f5ff'
            });

            // Render Road
            for (let i = segments.length - 1; i >= 0; i--) {
                let segment = segments[i];
                let perspective = 1 / (i * 0.12 + 1);
                
                let y = horizon + (height - horizon) * (1 - perspective);
                let nextPerspective = 1 / ((i-1) * 0.12 + 1);
                let nextY = horizon + (height - horizon) * (1 - nextPerspective);
                
                let w = roadWidth * perspective;
                let x = segment.x; 
                
                let nextSegment = segments[i-1] || segment;
                let nextW = roadWidth * nextPerspective;
                let nextX = nextSegment.x;

                let screenX = width/2 + (x - width/2) * perspective;
                let nextScreenX = width/2 + (nextX - width/2) * nextPerspective;

                // Cliff
                fill(20, 15, 30);
                beginShape();
                vertex(screenX - w, y);
                vertex(screenX - w, y + 100);
                vertex(nextScreenX - nextW, nextY + 100);
                vertex(nextScreenX - nextW, nextY);
                endShape(CLOSE);
                
                beginShape();
                vertex(screenX + w, y);
                vertex(screenX + w, y + 100);
                vertex(nextScreenX + nextW, nextY + 100);
                vertex(nextScreenX + nextW, nextY);
                endShape(CLOSE);

                // Road
                fill(segment.color);
                beginShape();
                vertex(screenX - w, y);
                vertex(screenX + w, y);
                vertex(nextScreenX + nextW, nextY);
                vertex(nextScreenX - nextW, nextY);
                endShape(CLOSE);

                // Rumble
                fill(segment.rumble);
                rect(screenX - w - 2, y, 4 * perspective, nextY - y);
                rect(screenX + w - 2, y, 4 * perspective, nextY - y);
            }

            // Controls
            if (keyIsDown(LEFT_ARROW)) playerX -= 7;
            if (keyIsDown(RIGHT_ARROW)) playerX += 7;
            playerX = constrain(playerX, 10, width - 10);

            // Draw ATV (Fixed perspective)
            push();
            translate(playerX, height - 70);
            
            // Subtle tilt
            if (keyIsDown(LEFT_ARROW)) rotate(-0.06);
            if (keyIsDown(RIGHT_ARROW)) rotate(0.06);

            // Shadow
            fill(0, 120);
            noStroke();
            ellipse(0, 15, 75, 22);

            // Wheels (Driving away)
            fill(15);
            // Rear Wheels
            rect(-32, 0, 18, 28, 5); 
            rect(14, 0, 18, 28, 5);  
            // Front Wheels
            rect(-28, -38, 14, 22, 5); 
            rect(14, -38, 14, 22, 5);  

            // Body
            fill(0, 245, 255); 
            beginShape();
            vertex(-20, 10); 
            vertex(20, 10);  
            vertex(14, -36); 
            vertex(-14, -36);
            endShape(CLOSE);

            // Seat
            fill(30);
            rect(-12, -12, 24, 24, 6);

            // Handlebars (At the top = front)
            stroke(255, 0, 224); 
            strokeWeight(5);
            line(-22, -34, 22, -34);
            // Grips
            stroke(0);
            line(-22, -34, -16, -34);
            line(16, -34, 22, -34);

            pop();

            // Collision
            let bottomRoadX = segments[0].x;
            if (abs(playerX - bottomRoadX) > roadWidth / 2 + 10) {
                gameOver();
            }

            score += speed;
            fill(0, 245, 255);
            noStroke();
            textSize(18);
            textAlign(LEFT);
            text("Distancia: " + floor(score/10) + "m", 25, 40);
            
            if (frameCount % 4 === 0) {
                particles.push({
                    x: random(width),
                    y: horizon,
                    vy: random(2, 6),
                    life: 255,
                    c: color(0, 245, 255, 100)
                });
            }
            updateParticles();
        }

        function gameOver() {
            gameActive = false;
            for(let i=0; i<30; i++) {
                particles.push({
                    x: playerX,
                    y: height - 70,
                    vx: random(-6, 6),
                    vy: random(-12, 0),
                    life: 255,
                    c: random(1) > 0.5 ? color(255, 0, 224) : color(0, 245, 255)
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if (gameActive) {
                    stroke(p.c);
                    line(p.x, p.y, p.x, p.y + p.vy * 3);
                    p.y += p.vy * 2;
                } else {
                    noStroke();
                    fill(p.c.levels[0], p.c.levels[1], p.c.levels[2], p.life);
                    circle(p.x, p.y, 6);
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.25;
                }
                p.life -= 4;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function keyPressed() {
            if ((key === 'r' || key === 'R') && !gameActive) {
                gameActive = true;
                playerX = width / 2;
                score = 0;
                segments = [];
                particles = [];
                for (let i = 0; i < totalSegments; i++) {
                    segments.push({
                        x: width / 2,
                        w: roadWidth,
                        color: i % 4 < 2 ? '#111' : '#1a1a1a',
                        rumble: i % 4 < 2 ? '#ff00e0' : '#00f5ff'
                    });
                }
            }
        }

        function windowResized() {
            let container = document.getElementById('game-container');
            resizeCanvas(container.offsetWidth, container.offsetHeight);
        }
    </script>
</body>
</html>
