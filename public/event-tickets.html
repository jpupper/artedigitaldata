<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrar Entradas - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <!-- QR Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="min-h-screen">
  <div id="app-header"></div>

  <main class="pt-20 pb-12 max-w-7xl mx-auto px-4">
    <!-- Loading -->
    <div id="loading" class="py-20 text-center">
      <i class="fas fa-spinner fa-spin text-4xl text-magenta-500 mb-4"></i>
      <p class="text-gray-500">Cargando...</p>
    </div>

    <!-- Access Denied -->
    <div id="access-denied" class="hidden py-20 text-center">
      <i class="fas fa-lock text-6xl text-red-500 mb-6"></i>
      <h2 class="text-2xl font-bold text-white mb-2">Acceso Denegado</h2>
      <p class="text-gray-500 mb-8">Solo el creador del evento puede administrar las entradas.</p>
      <a href="calendario.html" class="btn-primary px-8 py-3 rounded-xl">Volver al Calendario</a>
    </div>

    <!-- Content -->
    <div id="content" class="hidden">
      <!-- Header -->
      <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-8">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <a href="evento.html" id="back-link" class="text-gray-400 hover:text-white transition-colors">
              <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="text-3xl font-black text-white">Administrar Entradas</h1>
          </div>
          <p id="event-name" class="text-magenta-400 font-bold"></p>
        </div>
        <div class="flex gap-2">
          <button onclick="showScanner()" class="px-6 py-3 rounded-xl bg-green-500 text-black font-bold hover:bg-green-400 transition-all flex items-center gap-2">
            <i class="fas fa-qrcode"></i>
            Escanear QR
          </button>
          <button onclick="loadTickets()" class="px-6 py-3 rounded-xl border border-white/10 text-white font-bold hover:bg-white/5 transition-all">
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="rounded-2xl border border-white/10 bg-black/40 p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-500 uppercase tracking-wider">Total Entradas</p>
              <p id="stat-total" class="text-3xl font-black text-white">0</p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-magenta-500/20 flex items-center justify-center">
              <i class="fas fa-ticket-alt text-magenta-500 text-xl"></i>
            </div>
          </div>
        </div>
        <div class="rounded-2xl border border-white/10 bg-black/40 p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-500 uppercase tracking-wider">Vendidas/Pagadas</p>
              <p id="stat-completed" class="text-3xl font-black text-green-400">0</p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-green-500/20 flex items-center justify-center">
              <i class="fas fa-check-circle text-green-500 text-xl"></i>
            </div>
          </div>
        </div>
        <div class="rounded-2xl border border-white/10 bg-black/40 p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-500 uppercase tracking-wider">Canjeadas</p>
              <p id="stat-redeemed" class="text-3xl font-black text-cyan-400">0</p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-cyan-500/20 flex items-center justify-center">
              <i class="fas fa-door-open text-cyan-500 text-xl"></i>
            </div>
          </div>
        </div>
        <div class="rounded-2xl border border-white/10 bg-black/40 p-6">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-500 uppercase tracking-wider">Pendientes</p>
              <p id="stat-pending" class="text-3xl font-black text-yellow-400">0</p>
            </div>
            <div class="w-12 h-12 rounded-xl bg-yellow-500/20 flex items-center justify-center">
              <i class="fas fa-clock text-yellow-500 text-xl"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="flex flex-col sm:flex-row gap-4 mb-6">
        <div class="flex-1 relative">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
          <input type="text" id="search-input" placeholder="Buscar por código, nombre o email..." 
            oninput="filterTickets()"
            class="w-full bg-white/5 border border-white/10 rounded-xl pl-12 pr-4 py-3 text-white focus:border-magenta-500 focus:outline-none transition-colors">
        </div>
        <select id="filter-status" onchange="filterTickets()" class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-magenta-500 focus:outline-none">
          <option value="all">Todos los estados</option>
          <option value="pending">Pendientes</option>
          <option value="completed">Pagadas</option>
          <option value="redeemed">Canjeadas</option>
        </select>
      </div>

      <!-- Tickets Table -->
      <div class="rounded-2xl border border-white/10 bg-black/40 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-white/10 bg-black/20">
                <th class="text-left px-6 py-4 text-magenta-400 font-bold uppercase text-xs">Código</th>
                <th class="text-left px-6 py-4 text-magenta-400 font-bold uppercase text-xs">Dueño</th>
                <th class="text-left px-6 py-4 text-magenta-400 font-bold uppercase text-xs">Estado</th>
                <th class="text-left px-6 py-4 text-magenta-400 font-bold uppercase text-xs">Pago</th>
                <th class="text-left px-6 py-4 text-magenta-400 font-bold uppercase text-xs">Fecha</th>
                <th class="text-left px-6 py-4 text-magenta-400 font-bold uppercase text-xs">Acciones</th>
              </tr>
            </thead>
            <tbody id="tickets-tbody">
              <!-- Tickets will be injected here -->
            </tbody>
          </table>
        </div>
        <div id="no-tickets" class="hidden py-12 text-center text-gray-500">
          <i class="fas fa-ticket-alt text-4xl mb-4 opacity-30"></i>
          <p>No hay entradas todavía</p>
        </div>
      </div>
    </div>
  </main>

  <!-- QR Scanner Modal -->
  <div id="scanner-modal" class="hidden fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-lg">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold text-white flex items-center gap-2">
          <i class="fas fa-qrcode text-green-500"></i>
          Escanear Entrada
        </h3>
        <button onclick="hideScanner()" class="text-gray-400 hover:text-white">
          <i class="fas fa-times text-xl"></i>
        </button>
      </div>
      
      <div id="scanner-container" class="rounded-2xl overflow-hidden border border-white/10"></div>
      
      <div class="mt-4 flex gap-2">
        <input type="text" id="manual-code" placeholder="O ingresá el código manualmente..." 
          class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-green-500 focus:outline-none uppercase">
        <button onclick="redeemManual()" class="px-6 py-3 rounded-xl bg-green-500 text-black font-bold hover:bg-green-400 transition-all">
          Canjear
        </button>
      </div>
    </div>

    <!-- Scan Result -->
    <div id="scan-result" class="hidden fixed inset-0 z-[101] bg-black/90 flex items-center justify-center p-4">
      <div class="w-full max-w-sm rounded-3xl border border-white/10 bg-[#0d0d12] p-8 text-center">
        <div id="result-icon" class="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4">
          <!-- Icon -->
        </div>
        <h4 id="result-title" class="text-xl font-bold text-white mb-2"></h4>
        <p id="result-message" class="text-gray-400 mb-6"></p>
        <div id="result-details" class="mb-6 p-4 rounded-xl bg-white/5 text-left hidden">
          <!-- Details -->
        </div>
        <button onclick="closeScanResult()" class="w-full btn-primary py-3 rounded-xl font-bold">
          CONTINUAR
        </button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script>
    let currentEventId = null;
    let currentEvent = null;
    let allTickets = [];
    let filteredTickets = [];
    let scanner = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!isLoggedIn()) {
        showLogin();
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      currentEventId = urlParams.get('event');

      if (!currentEventId) {
        window.location.href = 'calendario.html';
        return;
      }

      await loadEvent();
    });

    async function loadEvent() {
      try {
        const res = await fetch(`${CONFIG.API_URL}/eventos/${currentEventId}`);
        if (!res.ok) throw new Error();
        const ev = await res.json();
        currentEvent = ev;

        // Check if user is creator (handle both string ID and object with _id)
        const userId = getUserId();
        const creatorId = ev.creator?._id || ev.creator;
        const isEventCreator = userId && creatorId && userId.toString() === creatorId.toString();
        const userIsAdmin = isAdmin();

        console.log('Debug - User ID:', userId, 'Creator ID:', creatorId, 'Is Creator:', isEventCreator, 'Is Admin:', userIsAdmin);

        if (!isEventCreator && !userIsAdmin) {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('access-denied').classList.remove('hidden');
          return;
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');

        document.getElementById('event-name').innerText = ev.title;
        document.getElementById('back-link').href = `evento.html?id=${ev._id}`;

        await Promise.all([loadTickets(), loadStats()]);
      } catch (err) {
        console.error('Error loading event:', err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('access-denied').classList.remove('hidden');
      }
    }

    async function loadTickets() {
      try {
        const res = await apiRequest(`/tickets/event/${currentEventId}`);
        if (!res.ok) throw new Error();
        allTickets = await res.json();
        filterTickets();
      } catch (err) {
        console.error('Error loading tickets:', err);
      }
    }

    async function loadStats() {
      try {
        const res = await apiRequest(`/tickets/event/${currentEventId}/stats`);
        if (!res.ok) throw new Error();
        const stats = await res.json();

        document.getElementById('stat-total').innerText = stats.total || 0;
        document.getElementById('stat-completed').innerText = stats.completed || 0;
        document.getElementById('stat-redeemed').innerText = stats.redeemed || 0;
        document.getElementById('stat-pending').innerText = stats.pending || 0;
      } catch (err) {
        console.error('Error loading stats:', err);
      }
    }

    function filterTickets() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const status = document.getElementById('filter-status').value;

      filteredTickets = allTickets.filter(t => {
        const matchesSearch = 
          t.code.toLowerCase().includes(search) ||
          (t.ownerName && t.ownerName.toLowerCase().includes(search)) ||
          (t.ownerEmail && t.ownerEmail.toLowerCase().includes(search));

        if (status === 'all') return matchesSearch;
        if (status === 'redeemed') return matchesSearch && t.redeemed;
        if (status === 'completed') return matchesSearch && !t.redeemed && (t.paymentStatus === 'completed' || t.paymentStatus === 'free');
        if (status === 'pending') return matchesSearch && !t.redeemed && t.paymentStatus === 'pending';

        return matchesSearch;
      });

      renderTickets();
    }

    function renderTickets() {
      const tbody = document.getElementById('tickets-tbody');
      const noTickets = document.getElementById('no-tickets');

      if (filteredTickets.length === 0) {
        tbody.innerHTML = '';
        noTickets.classList.remove('hidden');
        return;
      }

      noTickets.classList.add('hidden');

      tbody.innerHTML = filteredTickets.map(t => {
        let statusBadge, statusClass;
        if (t.redeemed) {
          statusBadge = '<i class="fas fa-check-double mr-1"></i>Canjeada';
          statusClass = 'bg-cyan-500/20 text-cyan-400';
        } else if (t.paymentStatus === 'completed' || t.paymentStatus === 'free') {
          statusBadge = '<i class="fas fa-check mr-1"></i>Válida';
          statusClass = 'bg-green-500/20 text-green-400';
        } else if (t.paymentStatus === 'pending') {
          statusBadge = '<i class="fas fa-clock mr-1"></i>Pendiente';
          statusClass = 'bg-yellow-500/20 text-yellow-400';
        } else {
          statusBadge = '<i class="fas fa-times mr-1"></i>Fallida';
          statusClass = 'bg-red-500/20 text-red-400';
        }

        return `
          <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
            <td class="px-6 py-4 font-mono font-bold text-white">${t.code}</td>
            <td class="px-6 py-4">
              <div class="text-white font-medium">${t.ownerName || 'Sin nombre'}</div>
              <div class="text-xs text-gray-500">${t.ownerEmail || ''}</div>
            </td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-xs font-bold ${statusClass}">
                ${statusBadge}
              </span>
            </td>
            <td class="px-6 py-4 text-gray-400 capitalize">${t.paymentStatus}</td>
            <td class="px-6 py-4 text-xs text-gray-500">${new Date(t.createdAt).toLocaleDateString('es-AR')}</td>
            <td class="px-6 py-4">
              <div class="flex gap-2">
                ${!t.redeemed && (t.paymentStatus === 'completed' || t.paymentStatus === 'free') ? `
                  <button onclick="redeemTicket('${t._id}')" class="px-3 py-1 rounded-lg bg-green-500/20 text-green-400 hover:bg-green-500/30 transition-all text-xs font-bold">
                    <i class="fas fa-door-open mr-1"></i>Canjear
                  </button>
                ` : ''}
                <button onclick="viewTicket('${t._id}')" class="px-3 py-1 rounded-lg bg-white/5 text-gray-400 hover:bg-white/10 transition-all text-xs">
                  <i class="fas fa-eye"></i>
                </button>
                <button onclick="deleteTicket('${t._id}')" class="px-3 py-1 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-all text-xs">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function redeemTicket(ticketId) {
      if (!confirm('¿Marcar esta entrada como canjeada?')) return;

      try {
        const res = await apiRequest(`/tickets/${ticketId}/redeem`, { method: 'POST' });
        if (res.ok) {
          await Promise.all([loadTickets(), loadStats()]);
          alert('Entrada canjeada exitosamente');
        } else {
          const err = await res.json();
          alert(err.error || 'Error al canjear entrada');
        }
      } catch (err) {
        alert('Error de conexión');
      }
    }

    async function deleteTicket(ticketId) {
      if (!confirm('¿Eliminar esta entrada permanentemente?')) return;

      try {
        const res = await apiRequest(`/tickets/${ticketId}`, { method: 'DELETE' });
        if (res.ok) {
          await Promise.all([loadTickets(), loadStats()]);
        } else {
          alert('Error al eliminar entrada');
        }
      } catch (err) {
        alert('Error de conexión');
      }
    }

    function viewTicket(ticketId) {
      const ticket = allTickets.find(t => t._id === ticketId);
      if (!ticket) return;

      // Open ticket success page with ticket code
      window.open(`ticket-success.html?ticket=${ticket.code}`, '_blank');
    }

    // QR Scanner
    function showScanner() {
      const modal = document.getElementById('scanner-modal');
      modal.classList.remove('hidden');

      if (!scanner) {
        scanner = new Html5Qrcode('scanner-container');
      }

      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        onScanFailure
      ).catch(err => {
        console.error('Scanner error:', err);
        alert('No se pudo iniciar la cámara. Podés ingresar el código manualmente.');
      });
    }

    function hideScanner() {
      const modal = document.getElementById('scanner-modal');
      modal.classList.add('hidden');

      if (scanner) {
        scanner.stop().catch(() => {});
      }
    }

    async function onScanSuccess(decodedText) {
      // Stop scanning
      if (scanner) {
        await scanner.stop().catch(() => {});
      }

      // Try to parse QR data
      let code;
      try {
        const data = JSON.parse(decodedText);
        code = data.code;
      } catch {
        code = decodedText;
      }

      await redeemByCode(code);
    }

    function onScanFailure(err) {
      // Ignore scan failures (happens frequently when no QR is in view)
    }

    async function redeemManual() {
      const code = document.getElementById('manual-code').value.trim();
      if (!code) return;
      await redeemByCode(code);
    }

    async function redeemByCode(code) {
      try {
        const res = await apiRequest('/tickets/redeem-by-code', {
          method: 'POST',
          body: JSON.stringify({ code })
        });

        const resultDiv = document.getElementById('scan-result');
        const iconDiv = document.getElementById('result-icon');
        const titleEl = document.getElementById('result-title');
        const messageEl = document.getElementById('result-message');
        const detailsEl = document.getElementById('result-details');

        resultDiv.classList.remove('hidden');

        if (res.ok) {
          const data = await res.json();
          iconDiv.className = 'w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4 bg-green-500/20';
          iconDiv.innerHTML = '<i class="fas fa-check text-4xl text-green-500"></i>';
          titleEl.innerText = '¡Entrada Canjeada!';
          titleEl.className = 'text-xl font-bold text-green-400 mb-2';
          messageEl.innerText = 'La entrada ha sido marcada como canjeada exitosamente.';
          
          detailsEl.classList.remove('hidden');
          detailsEl.innerHTML = `
            <p class="text-sm"><strong>Código:</strong> ${data.ticket.code}</p>
            <p class="text-sm"><strong>Nombre:</strong> ${data.ticket.ownerName || 'Sin nombre'}</p>
            ${data.ticket.redeemedAt ? `<p class="text-sm"><strong>Canjeada:</strong> ${new Date(data.ticket.redeemedAt).toLocaleString('es-AR')}</p>` : ''}
          `;

          await Promise.all([loadTickets(), loadStats()]);
        } else {
          const err = await res.json();
          iconDiv.className = 'w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4 bg-red-500/20';
          iconDiv.innerHTML = '<i class="fas fa-times text-4xl text-red-500"></i>';
          titleEl.innerText = 'Error';
          titleEl.className = 'text-xl font-bold text-red-400 mb-2';
          messageEl.innerText = err.error || 'No se pudo canjear la entrada';
          detailsEl.classList.add('hidden');
        }
      } catch (err) {
        console.error('Error redeeming:', err);
      }
    }

    function closeScanResult() {
      document.getElementById('scan-result').classList.add('hidden');
      document.getElementById('manual-code').value = '';
      
      // Restart scanner
      if (scanner && !document.getElementById('scanner-modal').classList.contains('hidden')) {
        scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          onScanFailure
        ).catch(() => {});
      }
    }
  </script>
</body>
</html>
