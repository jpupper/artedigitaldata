<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">
  <div id="app-header"></div>

  <main class="pt-20 pb-10 max-w-5xl mx-auto px-4">
    <!-- Profile Header -->
    <div id="profile-header" class="rounded-2xl p-8 border border-cyan-500/20 mb-8 card-cyber">
      <div class="flex flex-col md:flex-row items-center gap-6">
        <div id="profile-avatar" class="w-24 h-24 rounded-full flex items-center justify-center text-3xl font-black shrink-0"
             style="background: var(--gradient-neon); color: #0a0a0f;">
          ?
        </div>
        <div class="flex-1 text-center md:text-left">
          <h1 id="profile-username" class="text-2xl md:text-3xl font-black text-white">Cargando...</h1>
          <p id="profile-bio" class="text-gray-400 mt-2"></p>
          <p id="profile-meta" class="text-sm text-gray-500 mt-2"></p>
          <div id="profile-socials" class="flex flex-wrap gap-2 mt-4"></div>
        </div>
        </div>
        <div id="edit-profile-btn" class="hidden mt-4 md:mt-0">
          <button onclick="toggleEditMode()" class="px-6 py-3 rounded-xl border border-cyan-500/30 text-[var(--color-cyan)] hover:bg-cyan-500/10 font-bold transition-all shadow-[0_0_20px_rgba(0,255,255,0.05)]">
            <i class="fas fa-edit mr-2"></i>Editar Perfil
          </button>
        </div>
      </div>

      <!-- Edit Form (hidden by default) -->
      <div id="edit-form" class="hidden mt-6 pt-6 border-t border-white/10">
        <form id="profile-edit-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Nombre a Mostrar</label>
            <input type="text" id="edit-display-name" placeholder="Tu nombre artístico o real"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-[var(--color-cyan)] focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Bio</label>
            <textarea id="edit-bio" rows="3"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-orange-500 focus:outline-none transition-colors resize-none"
              placeholder="Contá sobre vos..."></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Avatar (URL o subir imagen)</label>
            <div class="flex gap-3">
              <input type="text" id="edit-avatar-url" placeholder="URL de imagen"
                class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-[var(--color-cyan)] focus:outline-none transition-colors">
              <input type="file" id="edit-avatar-file" accept="image/*"
                class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-400 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:bg-cyan-500/20 file:text-cyan-400 file:text-sm file:cursor-pointer">
            </div>
          </div>
          
          <div class="pt-6 border-t border-white/10 mt-6">
            <h3 class="text-xs font-black text-gray-500 uppercase mb-4 tracking-widest">Conectar Redes Sociales</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="relative group">
                <i class="fab fa-instagram absolute left-4 top-1/2 -translate-y-1/2 text-pink-500 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-instagram" placeholder="@usuario_instagram" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-pink-500/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-discord absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-discord" placeholder="Link de invitación o ID" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-indigo-400/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-whatsapp absolute left-4 top-1/2 -translate-y-1/2 text-green-500 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-whatsapp" placeholder="Número (ej: 5411...)" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-green-500/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-facebook absolute left-4 top-1/2 -translate-y-1/2 text-blue-600 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-facebook" placeholder="URL de tu perfil" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-blue-600/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-tiktok absolute left-4 top-1/2 -translate-y-1/2 text-white group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-tiktok" placeholder="@usuario_tiktok" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-white/50 focus:outline-none transition-all">
              </div>
            </div>
          </div>
          <button type="submit" class="btn-primary px-6 py-3 rounded-xl transition-all hover:scale-105">
            <i class="fas fa-save mr-2"></i>Guardar Cambios
          </button>
        </form>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-white/10 mb-8 overflow-x-auto scrollbar-hide">
      <button onclick="switchTab('posts')" id="tab-posts" class="tab-btn active px-6 py-4 text-sm font-bold text-[var(--color-cyan)] border-b-2 border-primary-500 whitespace-nowrap transition-all">
        <i class="fas fa-palette mr-2"></i>OBRAS
      </button>
      <button onclick="switchTab('recursos')" id="tab-recursos" class="tab-btn px-6 py-4 text-sm font-bold text-gray-500 hover:text-white whitespace-nowrap transition-all">
        <i class="fas fa-box-open mr-2"></i>RECURSOS
      </button>
      <button onclick="switchTab('eventos')" id="tab-eventos" class="tab-btn px-6 py-4 text-sm font-bold text-gray-500 hover:text-white whitespace-nowrap transition-all">
        <i class="fas fa-calendar-alt mr-2"></i>EVENTOS
      </button>
      <button onclick="switchTab('favs')" id="tab-favs" class="tab-btn px-6 py-4 text-sm font-bold text-gray-500 hover:text-white whitespace-nowrap transition-all">
        <i class="fas fa-heart mr-2 text-red-500"></i>TUS FAV
      </button>
      <button onclick="switchTab('tickets')" id="tab-tickets" class="tab-btn px-6 py-4 text-sm font-bold text-gray-500 hover:text-white whitespace-nowrap transition-all">
        <i class="fas fa-ticket-alt mr-2 text-fuchsia-500"></i>ENTRADAS
      </button>
    </div>

    <!-- Content Sections -->
    <div id="section-posts" class="content-section">
      <div id="user-posts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <i class="fas fa-spinner fa-spin text-2xl text-orange-400 mb-3"></i>
          <p>Cargando obras...</p>
        </div>
      </div>
    </div>

    <div id="section-recursos" class="content-section hidden">
      <div id="user-recursos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <p>Cargando recursos...</p>
        </div>
      </div>
    </div>

    <div id="section-eventos" class="content-section hidden">
      <div id="user-eventos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <p>Cargando eventos...</p>
        </div>
      </div>
    </div>

    <div id="section-favs" class="content-section hidden">
      <div id="user-favs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <p>Cargando favoritos...</p>
        </div>
      </div>
    </div>

    <div id="section-tickets" class="content-section hidden">
      <div id="user-tickets" class="space-y-4">
        <div class="text-center text-gray-500 py-10">
          <i class="fas fa-spinner fa-spin text-2xl text-fuchsia-400 mb-3"></i>
          <p>Cargando entradas...</p>
        </div>
      </div>
    </div>
  </main>  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/tagging.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/edit-logic.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const targetUsername = params.get('user');
    const currentUser = getUser();
    let isOwner = false;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!targetUsername) {
        if (isLoggedIn()) {
          window.location.href = CONFIG.BASE + `/profile.html?user=${currentUser.username}`;
        } else {
          showLogin();
        }
        return;
      }

      isOwner = currentUser && currentUser.username === targetUsername;
      if (isOwner) document.getElementById('edit-profile-btn').classList.remove('hidden');

      await loadProfile();

      document.getElementById('profile-edit-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        let avatar = document.getElementById('edit-avatar-url').value.trim();
        const bio = document.getElementById('edit-bio').value.trim();
        const displayName = document.getElementById('edit-display-name').value.trim();
        const file = document.getElementById('edit-avatar-file').files[0];

        if (file) {
          const formData = new FormData();
          formData.append('file', file);
          const uploadRes = await fetch(CONFIG.API_URL + '/upload', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${getToken()}` },
            body: formData
          });
          if (uploadRes.ok) {
            const data = await uploadRes.json();
            avatar = data.url;
          }
        }

        const socials = {
          instagram: document.getElementById('edit-social-instagram').value.trim(),
          discord: document.getElementById('edit-social-discord').value.trim(),
          whatsapp: document.getElementById('edit-social-whatsapp').value.trim(),
          facebook: document.getElementById('edit-social-facebook').value.trim(),
          tiktok: document.getElementById('edit-social-tiktok').value.trim()
        };

        const res = await apiRequest('/profile/me', {
          method: 'PATCH',
          body: JSON.stringify({ bio, avatar: avatar || undefined, displayName, socials })
        });

        if (res?.ok) {
          const updatedUser = await res.json();
          setUser({ ...currentUser, ...updatedUser });
          renderHeader();
          await loadProfile();
          toggleEditMode();
        }
      });
    });

    // Helper function to generate Google Maps URL
    function getGoogleMapsUrl(location) {
      if (!location) return '#';
      // If it's already a URL, return it
      if (location.startsWith('http')) return location;
      // Otherwise, create a Google Maps search URL
      const encoded = encodeURIComponent(location);
      return `https://www.google.com/maps/search/?api=1&query=${encoded}`;
    }

    async function loadProfile() {
      try {
        const res = await fetch(CONFIG.API_URL + `/profile/${targetUsername}`);
        if (!res.ok) throw new Error('Not found');
        const { user: profile, posts, recursos, eventos, doorEvents, favorites } = await res.json();

        document.getElementById('profile-username').textContent = profile.displayName || profile.username;
        const bioText = profile.bio || 'Sin bio';
        document.getElementById('profile-bio').innerHTML = typeof formatMentions === 'function' ? formatMentions(bioText) : bioText;
        document.getElementById('profile-meta').innerHTML = `
          <i class="fas fa-calendar-alt mr-1"></i> Se unió el ${new Date(profile.createdAt).toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' })}
          <span class="mx-2">•</span>
          <span class="px-2 py-0.5 rounded text-xs ${profile.role === 'ADMINISTRADOR' ? 'bg-cyan-500/20 text-[var(--color-cyan)] border border-cyan-500/30' : 'bg-white/10 text-gray-400'}">${profile.role}</span>
        `;

        const avatarEl = document.getElementById('profile-avatar');
        if (profile.avatar) {
          avatarEl.innerHTML = `<img src="${profile.avatar}" class="w-24 h-24 rounded-full object-cover" alt="${profile.displayName || profile.username}">`;
        } else {
          avatarEl.textContent = (profile.displayName || profile.username)[0].toUpperCase();
          avatarEl.innerHTML = (profile.displayName || profile.username)[0].toUpperCase();
        }

        if (isOwner) {
          document.getElementById('edit-display-name').value = profile.displayName || '';
          document.getElementById('edit-bio').value = profile.bio || '';
          document.getElementById('edit-avatar-url').value = profile.avatar || '';
          if (profile.socials) {
            document.getElementById('edit-social-instagram').value = profile.socials.instagram || '';
            document.getElementById('edit-social-discord').value = profile.socials.discord || '';
            document.getElementById('edit-social-whatsapp').value = profile.socials.whatsapp || '';
            document.getElementById('edit-social-facebook').value = profile.socials.facebook || '';
            document.getElementById('edit-social-tiktok').value = profile.socials.tiktok || '';
          }
        }

        const socialsContainer = document.getElementById('profile-socials');
        socialsContainer.innerHTML = '';
        if (profile.socials) {
          const s = profile.socials;
          if (s.instagram) socialsContainer.innerHTML += `<a href="https://instagram.com/${s.instagram.replace('@','')}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-pink-500/10 text-pink-500 hover:bg-pink-500 hover:text-white transition-all"><i class="fab fa-instagram"></i></a>`;
          if (s.discord) socialsContainer.innerHTML += `<a href="${s.discord.startsWith('http') ? s.discord : '#'}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white transition-all"><i class="fab fa-discord"></i></a>`;
          if (s.whatsapp) socialsContainer.innerHTML += `<a href="https://wa.me/${s.whatsapp.replace(/\+/g,'')}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-green-500/10 text-green-500 hover:bg-green-500 hover:text-white transition-all"><i class="fab fa-whatsapp"></i></a>`;
          if (s.facebook) socialsContainer.innerHTML += `<a href="${s.facebook.startsWith('http') ? s.facebook : `https://facebook.com/${s.facebook}`}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-blue-600/10 text-blue-600 hover:bg-blue-600 hover:text-white transition-all"><i class="fab fa-facebook"></i></a>`;
          if (s.tiktok) socialsContainer.innerHTML += `<a href="https://tiktok.com/@${s.tiktok.replace('@','')}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-gray-500/10 text-white hover:bg-white hover:text-black transition-all"><i class="fab fa-tiktok"></i></a>`;
        }
        
        renderUserPosts(posts);
        renderUserRecursos(recursos || []);
        renderUserEventos(eventos || [], isOwner ? (doorEvents || []) : []);
        renderUserFavorites(favorites || { posts: [], recursos: [], eventos: [] });

        // Load tickets if viewing own profile
        if (isOwner) {
          loadUserTickets();
        }
      } catch (err) {
        console.error("Error loading profile:", err);
        document.getElementById('profile-username').textContent = 'Usuario no encontrado';
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active', 'text-[var(--color-cyan)]', 'border-primary-500');
        btn.classList.add('text-gray-500');
      });
      document.getElementById('tab-' + tab).classList.add('active', 'text-[var(--color-cyan)]', 'border-primary-500');
      document.getElementById('tab-' + tab).classList.remove('text-gray-500');
      document.querySelectorAll('.content-section').forEach(sec => sec.classList.add('hidden'));
      document.getElementById('section-' + tab).classList.remove('hidden');
    }

    function renderUserPosts(posts) {
      const container = document.getElementById('user-posts');
      if (!posts.length) {
        container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10"><i class="fas fa-image text-4xl text-fuchsia-400/30 mb-3"></i><p>Este artista aún no tiene obras publicadas</p></div>`;
        return;
      }
      container.innerHTML = posts.map(p => {
        const youtubeId = extractYouTubeId(p);
        return `
          <div class="rounded-2xl overflow-hidden border border-cyan-500/10 card-cyber transition-all duration-300 group">
            <div class="relative aspect-video overflow-hidden">
              <div class="block w-full h-full relative cursor-pointer"
                 ${youtubeId ? `onmouseenter="playVideo(this, '${youtubeId}')" onmouseleave="stopVideo(this)"` : ''}
                 onclick="window.location.href='${CONFIG.BASE}/post.html?id=${p._id}'">
                ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">` : `<div class="w-full h-full bg-white/5 flex items-center justify-center"><i class="fas fa-palette text-3xl text-gray-700"></i></div>`}
                ${youtubeId ? `<div class="video-overlay absolute inset-0 opacity-0 transition-opacity duration-300 pointer-events-none bg-black"><iframe class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : ''}
              </div>
            </div>
            <div class="p-4">
              <div class="flex items-start justify-between gap-2 mb-1">
                <a href="${CONFIG.BASE}/post.html?id=${p._id}" target="_blank" class="block hover:text-[var(--color-cyan)] transition-colors flex-1">
                  <h3 class="font-bold text-white line-clamp-1">${p.title}</h3>
                </a>
                ${(isLoggedIn() && (isOwner || isAdmin())) ? `
                  <div class="flex gap-1">
                    <button onclick="openEditPost('${p._id}')" class="text-gray-500 hover:text-cyan-400 transition-colors p-1" title="Editar"><i class="fas fa-edit text-xs"></i></button>
                    <button onclick="deletePost('${p._id}')" class="text-gray-500 hover:text-red-500 transition-colors p-1" title="Eliminar"><i class="fas fa-trash-alt text-xs"></i></button>
                  </div>
                ` : ''}
              </div>
              <p class="text-gray-400 text-sm line-clamp-2">${p.description || ''}</p>
              <div class="flex items-center gap-3 mt-3 text-xs text-gray-500">
                <span><i class="fas fa-heart text-fuchsia-400 mr-1"></i>${p.likes?.length || 0}</span>
                <a href="${CONFIG.BASE}/post.html?id=${p._id}" target="_blank" class="hover:text-cyan-400"><i class="fas fa-comment mr-1"></i>${p.comments?.length || 0}</a>
                <span>${new Date(p.createdAt).toLocaleDateString('es-AR')}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function renderUserRecursos(recursos) {
      const container = document.getElementById('user-recursos');
      if (!recursos.length) {
        container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10"><i class="fas fa-box-open text-4xl text-orange-400/30 mb-3"></i><p>Este usuario aún no tiene recursos compartidos</p></div>`;
        return;
      }
      container.innerHTML = recursos.map(r => {
        const youtubeId = extractYouTubeId(r);
        return `
          <div class="rounded-2xl p-5 border border-orange-500/10 card-cyber transition-all duration-300 group">
             <div class="relative aspect-video w-full overflow-hidden rounded-xl mb-4">
               <div class="block w-full h-full relative cursor-pointer"
                  ${youtubeId ? `onmouseenter="playVideo(this, '${youtubeId}')" onmouseleave="stopVideo(this)"` : ''}
                  onclick="window.location.href='${CONFIG.BASE}/recurso.html?id=${r._id}'">
                 ${r.imageUrl ? `<img src="${r.imageUrl}" alt="${r.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">` : `<div class="w-full h-full bg-white/5 flex items-center justify-center"><i class="fas fa-box-open text-3xl text-gray-700 opacity-30"></i></div>`}
                 ${youtubeId ? `<div class="video-overlay absolute inset-0 opacity-0 transition-opacity duration-300 pointer-events-none bg-black"><iframe class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : ''}
               </div>
             </div>
            <div class="flex items-start justify-between gap-2 mb-2">
              <a href="${CONFIG.BASE}/recurso.html?id=${r._id}" target="_blank" class="block hover:text-orange-400 transition-colors flex-1">
                <h3 class="font-bold text-white line-clamp-1">${r.title}</h3>
              </a>
              ${(isLoggedIn() && (isOwner || isAdmin())) ? `
                <div class="flex gap-1">
                  <button onclick="openEditRecurso('${r._id}')" class="text-gray-500 hover:text-orange-400 transition-colors p-1" title="Editar"><i class="fas fa-edit text-xs"></i></button>
                  <button onclick="deleteRecurso('${r._id}')" class="text-gray-500 hover:text-red-500 transition-colors p-1" title="Eliminar"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>
              ` : ''}
            </div>
            <p class="text-xs text-gray-400 line-clamp-2 mb-3">${r.description || ''}</p>
            <div class="flex items-center gap-2 mb-3"><span class="px-2 py-0.5 rounded text-[10px] bg-orange-500/10 text-orange-400 uppercase font-bold">${r.type}</span></div>
            <div class="flex items-center justify-between text-[10px] text-gray-500 pt-3 border-t border-white/5"><span><i class="fas fa-comment mr-1"></i>${r.comments?.length || 0}</span><span>${new Date(r.createdAt).toLocaleDateString()}</span></div>
          </div>`;
      }).join('');
    }

    function renderUserEventos(eventos, doorEvents) {
      if (typeof window.renderUserEventos === 'function' && window.renderUserEventos !== renderUserEventos) {
        window.renderUserEventos(eventos, doorEvents);
        return;
      }
      const container = document.getElementById('user-eventos');
      const hasDoorEvents = doorEvents && doorEvents.length > 0;
      const hasOwnEvents = eventos && eventos.length > 0;
      if (!hasOwnEvents && !hasDoorEvents) {
        container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10"><i class="fas fa-calendar-times text-4xl text-magenta-400/30 mb-3"></i><p>Este usuario no tiene eventos registrados</p></div>`;
        return;
      }
      let html = '';
      if (hasOwnEvents) {
        if (hasDoorEvents) html += `<div class="col-span-full mb-2"><h3 class="text-xs font-black text-gray-500 uppercase tracking-widest flex items-center gap-2"><i class="fas fa-calendar-alt text-magenta-500"></i>Mis Eventos</h3></div>`;
        html += eventos.map(ev => renderEventoCardInline(ev, false)).join('');
      }
      if (hasDoorEvents) {
        html += `<div class="col-span-full mt-6 mb-2"><h3 class="text-xs font-black text-gray-500 uppercase tracking-widest flex items-center gap-2"><i class="fas fa-door-open text-cyan-500"></i>Control de Acceso / Puerta</h3><p class="text-xs text-gray-600 mt-1">Eventos donde podés escanear y canjear entradas</p></div>`;
        html += doorEvents.map(ev => renderEventoCardInline(ev, true)).join('');
      }
      container.innerHTML = html;
    }

    function renderEventoCardInline(ev, isDoorEvent) {
      const youtubeId = extractYouTubeId(ev);
      const borderColor = isDoorEvent ? 'border-cyan-500/20 hover:border-cyan-500/40' : 'border-magenta-500/10 hover:border-magenta-500/30';
      const dateColor = isDoorEvent ? 'bg-cyan-500/20 text-cyan-400' : 'bg-magenta-500/20 text-magenta-400';
      return `
        <div class="rounded-2xl p-5 border ${borderColor} bg-white/5 transition-all flex flex-col h-full group">
          <div class="relative aspect-video w-full overflow-hidden rounded-xl mb-4">
             <div class="block w-full h-full relative cursor-pointer"
                ${youtubeId ? `onmouseenter="playVideo(this, '${youtubeId}')" onmouseleave="stopVideo(this)"` : ''}
                onclick="window.location.href='${CONFIG.BASE}/evento.html?id=${ev._id}'">
               ${ev.imageUrl ? `<img src="${ev.imageUrl}" alt="${ev.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">` : `<div class="w-full h-full bg-magenta-500/10 flex items-center justify-center"><i class="fas fa-calendar-alt text-3xl text-magenta-500/30"></i></div>`}
               ${youtubeId ? `<div class="video-overlay absolute inset-0 opacity-0 transition-opacity duration-300 pointer-events-none bg-black"><iframe class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : ''}
             </div>
          </div>
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-lg ${dateColor} flex flex-col items-center justify-center font-bold shrink-0">
               <span class="text-[10px] leading-none uppercase">${new Date(ev.date).toLocaleDateString('es-AR', { month: 'short' })}</span>
               <span class="text-sm leading-none">${new Date(ev.date).getDate()}</span>
            </div>
            <div class="flex-1 min-w-0">
              <a href="${CONFIG.BASE}/evento.html?id=${ev._id}" target="_blank"><h3 class="font-bold text-white group-hover:text-magenta-400 transition-colors truncate">${ev.title}</h3></a>
              <p class="text-[10px] text-gray-500 truncate"><i class="fas fa-map-marker-alt mr-1"></i>${ev.location || 'Online'}</p>
            </div>
            <div class="flex gap-1 shrink-0">
              ${isDoorEvent ? `<a href="${CONFIG.BASE}/event-tickets.html?event=${ev._id}" class="px-2 py-1 rounded-lg bg-cyan-500/20 text-cyan-400 hover:bg-cyan-500/30 transition-all text-xs font-bold flex items-center gap-1"><i class="fas fa-door-open"></i><span>Puerta</span></a>` : ''}
              ${(!isDoorEvent && isLoggedIn() && (isOwner || isAdmin())) ? `
                ${ev.ticketConfig?.enabled ? `<a href="${CONFIG.BASE}/event-tickets.html?event=${ev._id}" class="text-green-400 hover:text-green-300 transition-colors p-1"><i class="fas fa-ticket-alt text-xs"></i></a>` : ''}
                <button onclick="openEditEvento('${ev._id}')" class="text-gray-500 hover:text-magenta-400 transition-colors p-1"><i class="fas fa-edit text-xs"></i></button>
                <button onclick="deleteEvento('${ev._id}')" class="text-gray-500 hover:text-red-500 transition-colors p-1"><i class="fas fa-trash-alt text-xs"></i></button>
              ` : ''}
            </div>
          </div>
          <p class="text-xs text-gray-400 line-clamp-2">${ev.description || ''}</p>
        </div>`;
    }

    function renderUserFavorites(favs) {
      const container = document.getElementById('user-favs');
      const allFavs = [
          ...favs.posts.map(p => ({ ...p, type: 'post' })),
          ...favs.recursos.map(r => ({ ...r, type: 'recurso' })),
          ...favs.eventos.map(e => ({ ...e, type: 'evento' }))
      ].sort((a, b) => new Date(b.createdAt || b.date) - new Date(a.createdAt || a.date));
      if (!allFavs.length) {
        container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-16 bg-white/5 rounded-3xl border border-dashed border-white/10"><i class="fas fa-heart-broken text-4xl text-gray-600 mb-3"></i><p>Aún no hay favoritos guardados</p></div>`;
        return;
      }
      container.innerHTML = allFavs.map(item => {
        const isPost = item.type === 'post';
        const isRecurso = item.type === 'recurso';
        const link = isPost ? `post.html?id=${item._id}` : (isRecurso ? `recurso.html?id=${item._id}` : `evento.html?id=${item._id}`);
        const color = isPost ? 'cyan' : (isRecurso ? 'orange' : 'magenta');
        const icon = isPost ? 'palette' : (isRecurso ? 'box-open' : 'calendar-alt');
        const youtubeId = extractYouTubeId(item);
        return `
          <div class="rounded-2xl overflow-hidden border border-${color}-500/10 card-cyber group">
            <div class="block aspect-video bg-white/5 relative overflow-hidden cursor-pointer"
               ${youtubeId ? `onmouseenter="playVideo(this, '${youtubeId}')" onmouseleave="stopVideo(this)"` : ''}
               onclick="window.open('${link}', '_blank')">
               ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-full object-cover transition-transform group-hover:scale-110">` : `<div class="w-full h-full flex items-center justify-center text-gray-700"><i class="fas fa-${icon} text-3xl"></i></div>`}
               ${youtubeId ? `<div class="video-overlay absolute inset-0 opacity-0 transition-opacity duration-300 pointer-events-none bg-black"><iframe class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : ''}
               <div class="absolute top-3 left-3 z-10"><span class="px-2 py-0.5 rounded-lg bg-black/60 backdrop-blur-md border border-white/10 text-[10px] font-bold text-${color}-400 uppercase tracking-widest">${item.type}</span></div>
            </div>
            <div class="p-4"><a href="${link}" target="_blank" class="block"><h3 class="font-bold text-white group-hover:text-${color}-400 transition-colors truncate mb-1">${item.title}</h3></a><p class="text-[10px] text-gray-500 flex items-center gap-2"><i class="fas fa-user-circle"></i> @${(item.author || item.creator)?.username || 'anónimo'}</p></div>
          </div>`;
      }).join('');
    }

    async function deletePost(postId) {
      if (!confirm('¿Estás seguro de que querés eliminar esta obra?')) return;
      const res = await apiRequest(`/posts/${postId}`, { method: 'DELETE' });
      if (res?.ok) await loadProfile();
    }

    async function deleteRecurso(id) {
      if (!confirm('¿Estás seguro de que querés eliminar este recurso?')) return;
      const res = await apiRequest(`/recursos/${id}`, { method: 'DELETE' });
      if (res?.ok) await loadProfile();
    }

    async function deleteEvento(id) {
      if (!confirm('¿Estás seguro de que querés eliminar este evento?')) return;
      const res = await apiRequest(`/eventos/${id}`, { method: 'DELETE' });
      if (res?.ok) await loadProfile();
    }

    // Load user tickets
    async function loadUserTickets() {
      try {
        const res = await apiRequest('/tickets/my');
        if (!res) {
          throw new Error('No response from server');
        }
        if (!res.ok) {
          const errorData = await res.json().catch(() => ({ error: 'Unknown error' }));
          console.error('[Tickets] Server error:', errorData);
          throw new Error(errorData.error || `HTTP ${res.status}`);
        }
        const tickets = await res.json();
        renderUserTickets(tickets);
      } catch (err) {
        console.error('Error loading tickets:', err);
        document.getElementById('user-tickets').innerHTML = `
          <div class="text-center text-gray-500 py-10">
            <i class="fas fa-exclamation-circle text-4xl text-red-400/30 mb-3"></i>
            <p>Error al cargar entradas</p>
            <p class="text-xs text-red-400 mt-2">${err.message}</p>
          </div>
        `;
      }
    }

    // Render user tickets
    function renderUserTickets(tickets) {
      const container = document.getElementById('user-tickets');

      if (!tickets.length) {
        container.innerHTML = `
          <div class="text-center text-gray-500 py-16 bg-white/5 rounded-3xl border border-dashed border-white/10">
            <i class="fas fa-ticket-alt text-4xl text-fuchsia-400/30 mb-3"></i>
            <p class="mb-2">No tenés entradas todavía</p>
            <a href="calendario.html" class="text-fuchsia-400 hover:text-fuchsia-300 text-sm">
              <i class="fas fa-calendar mr-1"></i>Ver eventos disponibles
            </a>
          </div>
        `;
        return;
      }

      container.innerHTML = tickets.map(t => {
        const ev = t.event;
        const isRedeemed = t.redeemed;
        const isPending = t.paymentStatus === 'pending';
        const isFree = t.paymentStatus === 'free' || t.paymentStatus === 'completed';

        let statusBadge, statusClass, statusIcon;
        if (isRedeemed) {
          statusBadge = 'Canjeada';
          statusClass = 'bg-gray-500/20 text-gray-400 border-gray-500/30';
          statusIcon = 'fa-check-double';
        } else if (isPending) {
          statusBadge = 'Pago Pendiente';
          statusClass = 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30';
          statusIcon = 'fa-clock';
        } else {
          statusBadge = 'Válida';
          statusClass = 'bg-green-500/20 text-green-400 border-green-500/30';
          statusIcon = 'fa-check';
        }

        return `
          <div class="rounded-2xl border border-white/10 bg-black/40 overflow-hidden hover:border-fuchsia-500/30 transition-all">
            <div class="flex flex-col md:flex-row">
              <!-- Event Image -->
              <div class="md:w-48 h-32 md:h-auto shrink-0 relative">
                ${ev.imageUrl ?
                  `<img src="${ev.imageUrl}" alt="${ev.title}" class="w-full h-full object-cover">` :
                  `<div class="w-full h-full bg-fuchsia-500/10 flex items-center justify-center"><i class="fas fa-calendar-alt text-3xl text-fuchsia-500/30"></i></div>`
                }
                <div class="absolute top-2 left-2">
                  <span class="px-2 py-1 rounded-lg ${statusClass} text-xs font-bold border">
                    <i class="fas ${statusIcon} mr-1"></i>${statusBadge}
                  </span>
                </div>
              </div>

              <!-- Ticket Info -->
              <div class="flex-1 p-5">
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
                  <div>
                    <a href="evento.html?id=${ev._id || ev.id}" class="text-lg font-bold text-white hover:text-fuchsia-400 transition-colors">
                      ${ev.title}
                    </a>
                    <p class="text-sm text-gray-500 mt-1">
                      <i class="fas fa-calendar mr-1"></i>
                      ${new Date(ev.date).toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}
                    </p>
                    ${ev.location ? `
                      <a href="${getGoogleMapsUrl(ev.location)}" target="_blank" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-blue-500/10 text-blue-400 border border-blue-500/30 hover:bg-blue-500/20 transition-all text-xs font-bold mt-2">
                        <i class="fas fa-map-marker-alt"></i>Ver en Google Maps
                      </a>
                    ` : '<p class="text-sm text-gray-500"><i class="fas fa-map-marker-alt mr-1"></i>Online</p>'}
                  </div>

                  <!-- QR Code -->
                  <div class="flex items-center gap-4">
                    <div class="text-center">
                      <div class="inline-block p-2 bg-white rounded-lg mb-2">
                        <img src="${t.qrData}" alt="QR" class="w-16 h-16">
                      </div>
                      <p class="text-xs font-mono text-fuchsia-400">${t.code}</p>
                    </div>
                  </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-3 mt-4 pt-4 border-t border-white/10">
                  <a href="ticket-success.html?ticket=${t.code}" class="flex-1 px-4 py-2 rounded-xl bg-fuchsia-500/10 text-fuchsia-400 border border-fuchsia-500/30 hover:bg-fuchsia-500/20 transition-all text-sm font-bold text-center">
                    <i class="fas fa-eye mr-1"></i>Ver Entrada
                  </a>
                  ${!isRedeemed && isFree ? `
                    <button onclick="downloadTicketQR('${t.code}')" class="px-4 py-2 rounded-xl bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10 transition-all text-sm">
                      <i class="fas fa-download"></i>
                    </button>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Download ticket QR
    function downloadTicketQR(code) {
      window.open(`ticket-success.html?ticket=${code}`, '_blank');
    }

    function toggleEditMode() {
      document.getElementById('edit-form').classList.toggle('hidden');
    }

    // --- EDIT MODALS LOGIC ---
    function openEditPost(id) { loadItemToEdit('posts', id); }
    function openEditRecurso(id) { loadItemToEdit('recursos', id); }
    function openEditEvento(id) { loadItemToEdit('eventos', id); }

    function closeGlobalEdit() {
      const modal = document.getElementById('global-edit-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
  </script>

  <!-- Global Edit Modal -->
  <div id="global-edit-modal" class="hidden fixed inset-0 z-[100] flex items-start justify-center bg-black/80 px-4 py-8 backdrop-blur-md overflow-y-auto">
    <div class="w-full max-w-3xl rounded-3xl border border-white/10 card-cyber bg-[#0d0d12] p-8 relative my-auto">
      <button onclick="closeGlobalEdit()" class="absolute top-4 right-4 text-gray-400 hover:text-white z-10 bg-black/50 w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/10 transition-all">
        <i class="fas fa-times"></i>
      </button>
      <div id="edit-modal-content" class="max-h-[70vh] overflow-y-auto pr-2 scrollbar-hide"></div>
    </div>
  </div>
</body>
</html>
