<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">
  <div id="app-header"></div>

  <main class="pt-20 pb-10 max-w-5xl mx-auto px-4">
    <!-- Profile Header -->
    <div id="profile-header" class="rounded-2xl p-8 border border-cyan-500/20 mb-8 card-cyber">
      <div class="flex flex-col md:flex-row items-center gap-6">
        <div id="profile-avatar" class="w-24 h-24 rounded-full flex items-center justify-center text-3xl font-black shrink-0"
             style="background: var(--gradient-neon); color: #0a0a0f;">
          ?
        </div>
        <div class="flex-1 text-center md:text-left">
          <h1 id="profile-username" class="text-2xl md:text-3xl font-black text-white">Cargando...</h1>
          <p id="profile-bio" class="text-gray-400 mt-2"></p>
          <p id="profile-meta" class="text-sm text-gray-500 mt-2"></p>
          <div id="profile-socials" class="flex flex-wrap gap-2 mt-4"></div>
        </div>
        </div>
        <div id="edit-profile-btn" class="hidden mt-4 md:mt-0">
          <button onclick="toggleEditMode()" class="px-6 py-3 rounded-xl border border-cyan-500/30 text-[var(--color-cyan)] hover:bg-cyan-500/10 font-bold transition-all shadow-[0_0_20px_rgba(0,255,255,0.05)]">
            <i class="fas fa-edit mr-2"></i>Editar Perfil
          </button>
        </div>
      </div>

      <!-- Edit Form (hidden by default) -->
      <div id="edit-form" class="hidden mt-6 pt-6 border-t border-white/10">
        <form id="profile-edit-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Nombre a Mostrar</label>
            <input type="text" id="edit-display-name" placeholder="Tu nombre artístico o real"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-[var(--color-cyan)] focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Bio</label>
            <textarea id="edit-bio" rows="3"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-orange-500 focus:outline-none transition-colors resize-none"
              placeholder="Contá sobre vos..."></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-400 mb-2">Avatar (URL o subir imagen)</label>
            <div class="flex gap-3">
              <input type="text" id="edit-avatar-url" placeholder="URL de imagen"
                class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-[var(--color-cyan)] focus:outline-none transition-colors">
              <input type="file" id="edit-avatar-file" accept="image/*"
                class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-400 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:bg-cyan-500/20 file:text-cyan-400 file:text-sm file:cursor-pointer">
            </div>
          </div>
          
          <div class="pt-6 border-t border-white/10 mt-6">
            <h3 class="text-xs font-black text-gray-500 uppercase mb-4 tracking-widest">Conectar Redes Sociales</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="relative group">
                <i class="fab fa-instagram absolute left-4 top-1/2 -translate-y-1/2 text-pink-500 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-instagram" placeholder="@usuario_instagram" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-pink-500/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-discord absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-discord" placeholder="Link de invitación o ID" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-indigo-400/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-whatsapp absolute left-4 top-1/2 -translate-y-1/2 text-green-500 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-whatsapp" placeholder="Número (ej: 5411...)" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-green-500/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-facebook absolute left-4 top-1/2 -translate-y-1/2 text-blue-600 group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-facebook" placeholder="URL de tu perfil" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-blue-600/50 focus:outline-none transition-all">
              </div>
              <div class="relative group">
                <i class="fab fa-tiktok absolute left-4 top-1/2 -translate-y-1/2 text-white group-focus-within:scale-110 transition-transform"></i>
                <input type="text" id="edit-social-tiktok" placeholder="@usuario_tiktok" 
                  class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-white placeholder-gray-600 focus:border-white/50 focus:outline-none transition-all">
              </div>
            </div>
          </div>
          <button type="submit" class="btn-primary px-6 py-3 rounded-xl transition-all hover:scale-105">
            <i class="fas fa-save mr-2"></i>Guardar Cambios
          </button>
        </form>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-white/10 mb-8 overflow-x-auto scrollbar-hide">
      <button onclick="switchTab('posts')" id="tab-posts" class="tab-btn active px-6 py-4 text-sm font-bold text-[var(--color-cyan)] border-b-2 border-primary-500 whitespace-nowrap transition-all">
        <i class="fas fa-palette mr-2"></i>OBRAS
      </button>
      <button onclick="switchTab('recursos')" id="tab-recursos" class="tab-btn px-6 py-4 text-sm font-bold text-gray-500 hover:text-white whitespace-nowrap transition-all">
        <i class="fas fa-box-open mr-2"></i>RECURSOS
      </button>
      <button onclick="switchTab('eventos')" id="tab-eventos" class="tab-btn px-6 py-4 text-sm font-bold text-gray-500 hover:text-white whitespace-nowrap transition-all">
        <i class="fas fa-calendar-alt mr-2"></i>EVENTOS
      </button>
      <button onclick="switchTab('favs')" id="tab-favs" class="tab-btn px-6 py-4 text-sm font-bold text-gray-500 hover:text-white whitespace-nowrap transition-all">
        <i class="fas fa-heart mr-2 text-red-500"></i>TUS FAV
      </button>
    </div>

    <!-- Content Sections -->
    <div id="section-posts" class="content-section">
      <div id="user-posts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <i class="fas fa-spinner fa-spin text-2xl text-orange-400 mb-3"></i>
          <p>Cargando obras...</p>
        </div>
      </div>
    </div>

    <div id="section-recursos" class="content-section hidden">
      <div id="user-recursos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <p>Cargando recursos...</p>
        </div>
      </div>
    </div>

    <div id="section-eventos" class="content-section hidden">
      <div id="user-eventos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <p>Cargando eventos...</p>
        </div>
      </div>
    </div>

    <div id="section-favs" class="content-section hidden">
      <div id="user-favs" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-10">
          <p>Cargando favoritos...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="/artedigitaldata/js/config.js"></script>
  <script src="/artedigitaldata/js/auth.js"></script>
  <script src="/artedigitaldata/js/header.js"></script>
  <script src="/artedigitaldata/js/tagging.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const targetUsername = params.get('user');
    const currentUser = getUser();
    let isOwner = false;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!targetUsername) {
        if (isLoggedIn()) {
          window.location.href = CONFIG.BASE + `/profile.html?user=${currentUser.username}`;
        } else {
          window.location.href = CONFIG.BASE + '/login.html';
        }
        return;
      }

      isOwner = currentUser && currentUser.username === targetUsername;
      if (isOwner) document.getElementById('edit-profile-btn').classList.remove('hidden');

      await loadProfile();

      document.getElementById('profile-edit-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        let avatar = document.getElementById('edit-avatar-url').value.trim();
        const bio = document.getElementById('edit-bio').value.trim();
        const displayName = document.getElementById('edit-display-name').value.trim();
        const file = document.getElementById('edit-avatar-file').files[0];

        if (file) {
          const formData = new FormData();
          formData.append('file', file);
          const uploadRes = await fetch(CONFIG.API_URL + '/upload', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${getToken()}` },
            body: formData
          });
          if (uploadRes.ok) {
            const data = await uploadRes.json();
            avatar = data.url;
          }
        }

        const socials = {
          instagram: document.getElementById('edit-social-instagram').value.trim(),
          discord: document.getElementById('edit-social-discord').value.trim(),
          whatsapp: document.getElementById('edit-social-whatsapp').value.trim(),
          facebook: document.getElementById('edit-social-facebook').value.trim(),
          tiktok: document.getElementById('edit-social-tiktok').value.trim()
        };

        const res = await apiRequest('/profile/me', {
          method: 'PATCH',
          body: JSON.stringify({ bio, avatar: avatar || undefined, displayName, socials })
        });

        if (res?.ok) {
          const updatedUser = await res.json();
          setUser({ ...currentUser, ...updatedUser }); // Update localStorage
          renderHeader(); // Refresh header
          await loadProfile();
          toggleEditMode();
        }
      });
    });

    async function loadProfile() {
      try {
        const res = await fetch(CONFIG.API_URL + `/profile/${targetUsername}`);
        if (!res.ok) throw new Error('Not found');
        const { user: profile, posts, recursos, eventos, favorites } = await res.json();

        document.getElementById('profile-username').textContent = profile.displayName || profile.username;
        const bioText = profile.bio || 'Sin bio';
        document.getElementById('profile-bio').innerHTML = typeof formatMentions === 'function' 
          ? formatMentions(bioText) 
          : bioText;
        document.getElementById('profile-meta').innerHTML = `
          <i class="fas fa-calendar-alt mr-1"></i> Se unió el ${new Date(profile.createdAt).toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' })}
          <span class="mx-2">•</span>
          <span class="px-2 py-0.5 rounded text-xs ${profile.role === 'ADMINISTRADOR' ? 'bg-cyan-500/20 text-[var(--color-cyan)] border border-cyan-500/30' : 'bg-white/10 text-gray-400'}">${profile.role}</span>
        `;

        const avatarEl = document.getElementById('profile-avatar');
        if (profile.avatar) {
          avatarEl.innerHTML = `<img src="${profile.avatar}" class="w-24 h-24 rounded-full object-cover" alt="${profile.displayName || profile.username}">`;
        } else {
          avatarEl.textContent = (profile.displayName || profile.username)[0].toUpperCase();
          avatarEl.innerHTML = (profile.displayName || profile.username)[0].toUpperCase();
        }

        if (isOwner) {
          document.getElementById('edit-display-name').value = profile.displayName || '';
          document.getElementById('edit-bio').value = profile.bio || '';
          document.getElementById('edit-avatar-url').value = profile.avatar || '';
          
          if (profile.socials) {
            document.getElementById('edit-social-instagram').value = profile.socials.instagram || '';
            document.getElementById('edit-social-discord').value = profile.socials.discord || '';
            document.getElementById('edit-social-whatsapp').value = profile.socials.whatsapp || '';
            document.getElementById('edit-social-facebook').value = profile.socials.facebook || '';
            document.getElementById('edit-social-tiktok').value = profile.socials.tiktok || '';
          }
        }

        // Socials Display
        const socialsContainer = document.getElementById('profile-socials');
        socialsContainer.innerHTML = '';
        if (profile.socials) {
          const s = profile.socials;
          if (s.instagram) socialsContainer.innerHTML += `<a href="https://instagram.com/${s.instagram.replace('@','')}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-pink-500/10 text-pink-500 hover:bg-pink-500 hover:text-white transition-all"><i class="fab fa-instagram"></i></a>`;
          if (s.discord) socialsContainer.innerHTML += `<a href="${s.discord.startsWith('http') ? s.discord : '#'}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white transition-all"><i class="fab fa-discord"></i></a>`;
          if (s.whatsapp) socialsContainer.innerHTML += `<a href="https://wa.me/${s.whatsapp.replace(/\+/g,'')}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-green-500/10 text-green-500 hover:bg-green-500 hover:text-white transition-all"><i class="fab fa-whatsapp"></i></a>`;
          if (s.facebook) socialsContainer.innerHTML += `<a href="${s.facebook.startsWith('http') ? s.facebook : `https://facebook.com/${s.facebook}`}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-blue-600/10 text-blue-600 hover:bg-blue-600 hover:text-white transition-all"><i class="fab fa-facebook"></i></a>`;
          if (s.tiktok) socialsContainer.innerHTML += `<a href="https://tiktok.com/@${s.tiktok.replace('@','')}" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-gray-500/10 text-white hover:bg-white hover:text-black transition-all"><i class="fab fa-tiktok"></i></a>`;
        }
        
        console.log("Profile data:", { posts: posts.length, recursos: recursos?.length, eventos: eventos?.length });

        renderUserPosts(posts);
        renderUserRecursos(recursos || []);
        renderUserEventos(eventos || []);
        renderUserFavorites(favorites || { posts: [], recursos: [], eventos: [] });
      } catch (err) {
        console.error("Error loading profile:", err);
        document.getElementById('profile-username').textContent = 'Usuario no encontrado';
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active', 'text-[var(--color-cyan)]', 'border-primary-500');
        btn.classList.add('text-gray-500');
      });
      document.getElementById('tab-' + tab).classList.add('active', 'text-[var(--color-cyan)]', 'border-primary-500');
      document.getElementById('tab-' + tab).classList.remove('text-gray-500');

      document.querySelectorAll('.content-section').forEach(sec => sec.classList.add('hidden'));
      document.getElementById('section-' + tab).classList.remove('hidden');
    }

    function extractYouTubeId(url) {
      if (!url) return null;
      const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
      const match = url.match(regex);
      return match ? match[1] : null;
    }

    function playVideo(el, youtubeId) {
      const overlay = el.querySelector('.video-overlay');
      const iframe = overlay.querySelector('iframe');
      if (!iframe.src) {
        iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${youtubeId}&modestbranding=1&rel=0`;
      }
      overlay.style.opacity = '1';
    }

    function stopVideo(el) {
      const overlay = el.querySelector('.video-overlay');
      const iframe = overlay.querySelector('iframe');
      overlay.style.opacity = '0';
      iframe.src = ''; // Stop video
    }

    function renderUserPosts(posts) {
      const container = document.getElementById('user-posts');
      if (!posts.length) {
        container.innerHTML = `
          <div class="col-span-full text-center text-gray-500 py-10">
            <i class="fas fa-image text-4xl text-fuchsia-400/30 mb-3"></i>
            <p>Este artista aún no tiene obras publicadas</p>
          </div>`;
        return;
      }

      container.innerHTML = posts.map(p => {
        const youtubeId = extractYouTubeId(p.youtube_video);
        return `
          <div class="rounded-2xl overflow-hidden border border-cyan-500/10 card-cyber transition-all duration-300 group">
            <div class="relative aspect-video overflow-hidden">
              <a href="${CONFIG.BASE}/post.html?id=${p._id}" target="_blank" class="block w-full h-full relative"
                 ${youtubeId ? `onmouseenter="playVideo(this, '${youtubeId}')" onmouseleave="stopVideo(this)"` : ''}>
                ${p.imageUrl ? `
                  <img src="${p.imageUrl}" alt="${p.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                ` : `
                  <div class="w-full h-full bg-white/5 flex items-center justify-center">
                    <i class="fas fa-palette text-3xl text-gray-700"></i>
                  </div>
                `}
                
                ${youtubeId ? `
                  <div class="video-overlay absolute inset-0 opacity-0 transition-opacity duration-300 pointer-events-none">
                    <iframe class="w-full h-full" 
                            src="" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen></iframe>
                  </div>
                ` : ''}
              </a>
            </div>
            <div class="p-4">
              <div class="flex items-start justify-between gap-2 mb-1">
                <a href="${CONFIG.BASE}/post.html?id=${p._id}" target="_blank" class="block hover:text-[var(--color-cyan)] transition-colors flex-1">
                  <h3 class="font-bold text-white line-clamp-1">${p.title}</h3>
                </a>
                ${(isLoggedIn() && (isOwner || isAdmin())) ? `
                  <div class="flex gap-1">
                    <button onclick="openEditPost('${p._id}')" class="text-gray-500 hover:text-cyan-400 transition-colors p-1" title="Editar">
                      <i class="fas fa-edit text-xs"></i>
                    </button>
                    <button onclick="deletePost('${p._id}')" class="text-gray-500 hover:text-red-500 transition-colors p-1" title="Eliminar">
                      <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                  </div>
                ` : ''}
              </div>
              <p class="text-gray-400 text-sm line-clamp-2">${p.description || ''}</p>
              <div class="flex items-center gap-3 mt-3 text-xs text-gray-500">
                <span><i class="fas fa-heart text-fuchsia-400 mr-1"></i>${p.likes?.length || 0}</span>
                <a href="${CONFIG.BASE}/post.html?id=${p._id}" target="_blank" class="hover:text-cyan-400">
                  <i class="fas fa-comment mr-1"></i>${p.comments?.length || 0}
                </a>
                <span>${new Date(p.createdAt).toLocaleDateString('es-AR')}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderUserRecursos(recursos) {
      const container = document.getElementById('user-recursos');
      if (!recursos.length) {
        container.innerHTML = `
          <div class="col-span-full text-center text-gray-500 py-10">
            <i class="fas fa-box-open text-4xl text-orange-400/30 mb-3"></i>
            <p>Este usuario aún no tiene recursos compartidos</p>
          </div>`;
        return;
      }

      container.innerHTML = recursos.map(r => {
        const youtubeId = extractYouTubeId(r.youtube_video);
        return `
          <div class="rounded-2xl p-5 border border-orange-500/10 card-cyber transition-all duration-300 group">
             <div class="relative aspect-video w-full overflow-hidden rounded-xl mb-4">
               <a href="${CONFIG.BASE}/recurso.html?id=${r._id}" target="_blank" class="block w-full h-full relative"
                  ${youtubeId ? `onmouseenter="playVideo(this, '${youtubeId}')" onmouseleave="stopVideo(this)"` : ''}>
                 ${r.imageUrl ? `
                   <img src="${r.imageUrl}" alt="${r.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                 ` : `
                   <div class="w-full h-full bg-white/5 flex items-center justify-center">
                     <i class="fas fa-box-open text-3xl text-gray-700 opacity-30"></i>
                   </div>
                 `}
                 
                 ${youtubeId ? `
                   <div class="video-overlay absolute inset-0 opacity-0 transition-opacity duration-300 pointer-events-none">
                     <iframe class="w-full h-full" 
                             src="" 
                             frameborder="0" 
                             allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                             allowfullscreen></iframe>
                   </div>
                 ` : ''}
               </a>
             </div>
            <div class="flex items-start justify-between gap-2 mb-2">
              <a href="${CONFIG.BASE}/recurso.html?id=${r._id}" target="_blank" class="block hover:text-orange-400 transition-colors flex-1">
                <h3 class="font-bold text-white line-clamp-1">${r.title}</h3>
              </a>
              ${(isLoggedIn() && (isOwner || isAdmin())) ? `
                <div class="flex gap-1">
                  <button onclick="openEditRecurso('${r._id}')" class="text-gray-500 hover:text-orange-400 transition-colors p-1" title="Editar">
                    <i class="fas fa-edit text-xs"></i>
                  </button>
                  <button onclick="deleteRecurso('${r._id}')" class="text-gray-500 hover:text-red-500 transition-colors p-1" title="Eliminar">
                    <i class="fas fa-trash-alt text-xs"></i>
                  </button>
                </div>
              ` : ''}
            </div>
            <p class="text-xs text-gray-400 line-clamp-2 mb-3">${r.description || ''}</p>
            <div class="flex items-center gap-2 mb-3">
               <span class="px-2 py-0.5 rounded text-[10px] bg-orange-500/10 text-orange-400 uppercase font-bold">${r.type}</span>
            </div>
            <div class="flex items-center justify-between text-[10px] text-gray-500 pt-3 border-t border-white/5">
               <span><i class="fas fa-comment mr-1"></i>${r.comments?.length || 0}</span>
               <span>${new Date(r.createdAt).toLocaleDateString()}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderUserEventos(eventos) {
      const container = document.getElementById('user-eventos');
      if (!eventos.length) {
        container.innerHTML = `
          <div class="col-span-full text-center text-gray-500 py-10">
            <i class="fas fa-calendar-times text-4xl text-magenta-400/30 mb-3"></i>
            <p>Este usuario no tiene eventos registrados</p>
          </div>`;
        return;
      }

      container.innerHTML = eventos.map(ev => {
        const youtubeId = extractYouTubeId(ev.youtube_video);
        return `
          <div class="rounded-2xl p-5 border border-magenta-500/10 bg-white/5 hover:border-magenta-500/30 transition-all flex flex-col h-full group">
            <div class="relative aspect-video w-full overflow-hidden rounded-xl mb-4">
               <a href="${CONFIG.BASE}/evento.html?id=${ev._id}" target="_blank" class="block w-full h-full relative"
                  ${youtubeId ? `onmouseenter="playVideo(this, '${youtubeId}')" onmouseleave="stopVideo(this)"` : ''}>
                 ${ev.imageUrl ? `
                   <img src="${ev.imageUrl}" alt="${ev.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                 ` : `
                   <div class="w-full h-full bg-magenta-500/10 flex items-center justify-center">
                     <i class="fas fa-calendar-alt text-3xl text-magenta-500/30"></i>
                   </div>
                 `}
                 
                 ${youtubeId ? `
                   <div class="video-overlay absolute inset-0 opacity-0 transition-opacity duration-300 pointer-events-none">
                     <iframe class="w-full h-full" 
                             src="" 
                             frameborder="0" 
                             allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                             allowfullscreen></iframe>
                   </div>
                 ` : ''}
               </a>
            </div>
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-lg bg-magenta-500/20 flex flex-col items-center justify-center text-magenta-400 font-bold shrink-0">
                 <span class="text-[10px] leading-none uppercase">${new Date(ev.date).toLocaleDateString('es-AR', { month: 'short' })}</span>
                 <span class="text-sm leading-none">${new Date(ev.date).getDate()}</span>
              </div>
              <div class="flex-1 min-w-0">
                <a href="${CONFIG.BASE}/evento.html?id=${ev._id}" target="_blank">
                  <h3 class="font-bold text-white group-hover:text-magenta-400 transition-colors truncate">${ev.title}</h3>
                </a>
                <p class="text-[10px] text-gray-500 truncate"><i class="fas fa-map-marker-alt mr-1"></i>${ev.location || 'Online'}</p>
              </div>
              ${(isLoggedIn() && (isOwner || isAdmin())) ? `
                <div class="flex gap-1 shrink-0">
                  <button onclick="openEditEvento('${ev._id}')" class="text-gray-500 hover:text-magenta-400 transition-colors p-1" title="Editar">
                    <i class="fas fa-edit text-xs"></i>
                  </button>
                  <button onclick="deleteEvento('${ev._id}')" class="text-gray-500 hover:text-red-500 transition-colors p-1" title="Eliminar">
                    <i class="fas fa-trash-alt text-xs"></i>
                  </button>
                </div>
              ` : ''}
            </div>
            <p class="text-xs text-gray-400 line-clamp-2">${ev.description || ''}</p>
          </div>
        `;
      }).join('');
    }

    function renderUserFavorites(favs) {
      const container = document.getElementById('user-favs');
      const allFavs = [
          ...favs.posts.map(p => ({ ...p, type: 'post' })),
          ...favs.recursos.map(r => ({ ...r, type: 'recurso' })),
          ...favs.eventos.map(e => ({ ...e, type: 'evento' }))
      ].sort((a, b) => new Date(b.createdAt || b.date) - new Date(a.createdAt || a.date));

      if (!allFavs.length) {
        container.innerHTML = `
          <div class="col-span-full text-center text-gray-500 py-16 bg-white/5 rounded-3xl border border-dashed border-white/10">
            <i class="fas fa-heart-broken text-4xl text-gray-600 mb-3"></i>
            <p>Aún no hay favoritos guardados</p>
          </div>`;
        return;
      }

      container.innerHTML = allFavs.map(item => {
        const isPost = item.type === 'post';
        const isRecurso = item.type === 'recurso';
        const link = isPost ? `post.html?id=${item._id}` : (isRecurso ? `recurso.html?id=${item._id}` : `evento.html?id=${item._id}`);
        const color = isPost ? 'cyan' : (isRecurso ? 'orange' : 'magenta');
        const icon = isPost ? 'palette' : (isRecurso ? 'box-open' : 'calendar-alt');
        
        return `
          <div class="rounded-2xl overflow-hidden border border-${color}-500/10 card-cyber group">
            <a href="${link}" target="_blank" class="block aspect-video bg-white/5 relative overflow-hidden">
               ${item.imageUrl ? `<img src="${item.imageUrl}" class="w-full h-full object-cover transition-transform group-hover:scale-110">` : `
                 <div class="w-full h-full flex items-center justify-center text-gray-700">
                    <i class="fas fa-${icon} text-3xl"></i>
                 </div>
               `}
               <div class="absolute top-3 left-3">
                 <span class="px-2 py-0.5 rounded-lg bg-black/60 backdrop-blur-md border border-white/10 text-[10px] font-bold text-${color}-400 uppercase tracking-widest">
                   ${item.type}
                 </span>
               </div>
            </a>
            <div class="p-4">
               <a href="${link}" target="_blank" class="block">
                  <h3 class="font-bold text-white group-hover:text-${color}-400 transition-colors truncate mb-1">${item.title}</h3>
               </a>
               <p class="text-[10px] text-gray-500 flex items-center gap-2">
                 <i class="fas fa-user-circle"></i> @${(item.author || item.creator)?.username || 'anónimo'}
               </p>
            </div>
          </div>
        `;
      }).join('');
    }

    async function deletePost(postId) {
      if (!confirm('¿Estás seguro de que querés eliminar esta obra?')) return;
      const res = await apiRequest(`/posts/${postId}`, { method: 'DELETE' });
      if (res?.ok) {
        await loadProfile();
      }
    }

    async function deleteRecurso(id) {
      if (!confirm('¿Estás seguro de que querés eliminar este recurso?')) return;
      const res = await apiRequest(`/recursos/${id}`, { method: 'DELETE' });
      if (res?.ok) {
        await loadProfile();
      }
    }

    function toggleEditMode() {
      document.getElementById('edit-form').classList.toggle('hidden');
    }

    // --- EDIT MODALS LOGIC ---
    let editingItem = null;

    function openEditPost(id) {
      const container = document.getElementById('user-posts');
      const posts = Array.from(container.querySelectorAll('h3')).map(h => ({ _id: h.closest('.card-cyber').querySelector('button[onclick*="deletePost"]').onclick.toString().match(/'(.*)'/)[1], title: h.innerText }));
      // This is hacky. Better to store original data.
      // Let's refetch the post data for safety.
      loadItemToEdit('posts', id);
    }

    function openEditRecurso(id) { loadItemToEdit('recursos', id); }
    function openEditEvento(id) { loadItemToEdit('eventos', id); }

    async function loadItemToEdit(type, id) {
      try {
        const res = await fetch(`${CONFIG.API_URL}/${type}/${id}`);
        const item = await res.json();
        editingItem = { type, id, currentImageUrl: item.imageUrl };
        
        const modal = document.getElementById('global-edit-modal');
        const content = document.getElementById('edit-modal-content');
        modal.classList.remove('hidden');
        modal.classList.add('flex');

        let fieldsHtml = '';
        if (type === 'posts') {
          fieldsHtml = `
            <h3 class="text-xl font-bold text-white mb-6 uppercase tracking-tighter">Editar <span class="text-cyan-400">Obra</span></h3>
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Título</label>
                <input type="text" id="edit-item-title" value="${item.title}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-500">
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Descripción</label>
                <textarea id="edit-item-desc" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-500 resize-none" rows="4">${item.description || ''}</textarea>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Etiquetas (separadas por coma)</label>
                <input type="text" id="edit-item-tags" value="${(item.tags || []).join(', ')}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-cyan-500" placeholder="Ej: 3d, blender, neon">
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Imagen (Subir nueva o dejar actual)</label>
                <input type="file" id="edit-item-file" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-400 file:mr-4 file:py-1 file:px-4 file:rounded-lg file:border-0 file:bg-cyan-500/20 file:text-cyan-400 file:cursor-pointer">
              </div>
            </div>
          `;
        } else if (type === 'recursos') {
          fieldsHtml = `
            <h3 class="text-xl font-bold text-white mb-6 uppercase tracking-tighter">Editar <span class="text-orange-400">Recurso</span></h3>
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Título del Recurso</label>
                <input type="text" id="edit-item-title" value="${item.title}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-orange-500">
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Tipo</label>
                  <select id="edit-item-type" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-orange-500">
                    <option value="software" ${item.type === 'software' ? 'selected' : ''}>Software</option>
                    <option value="github" ${item.type === 'github' ? 'selected' : ''}>GitHub / Código</option>
                    <option value="drive" ${item.type === 'drive' ? 'selected' : ''}>Drive / Descarga</option>
                    <option value="tutorial" ${item.type === 'tutorial' ? 'selected' : ''}>Tutorial / Guía</option>
                    <option value="texto" ${item.type === 'texto' ? 'selected' : ''}>Texto / Artículo</option>
                    <option value="other" ${item.type === 'other' ? 'selected' : ''}>Otro</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Enlace (URL)</label>
                  <input type="url" id="edit-item-url" value="${item.url}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-orange-500">
                </div>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Descripción</label>
                <textarea id="edit-item-desc" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-orange-500 resize-none" rows="3">${item.description || ''}</textarea>
              </div>
               <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Etiquetas</label>
                <input type="text" id="edit-item-tags" value="${(item.tags || []).join(', ')}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-orange-500">
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Imagen (Opcional)</label>
                <input type="file" id="edit-item-file" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-400 file:mr-4 file:py-1 file:px-4 file:rounded-lg file:border-0 file:bg-orange-500/20 file:text-orange-400 file:cursor-pointer">
              </div>
            </div>
          `;
        } else if (type === 'eventos') {
          const date = item.date ? new Date(item.date).toISOString().slice(0, 16) : '';
          fieldsHtml = `
            <h3 class="text-xl font-bold text-white mb-6 uppercase tracking-tighter">Editar <span class="text-magenta-400">Evento</span></h3>
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Nombre del Evento</label>
                <input type="text" id="edit-item-title" value="${item.title}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-magenta-500">
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Fecha y Hora</label>
                  <input type="datetime-local" id="edit-item-date" value="${date}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-magenta-500">
                </div>
                <div>
                  <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Lugar / Enlace</label>
                  <input type="text" id="edit-item-location" value="${item.location || ''}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-magenta-500">
                </div>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Descripción</label>
                <textarea id="edit-item-desc" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-magenta-500 resize-none" rows="3">${item.description || ''}</textarea>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Imagen (URL o subir archivo abajo)</label>
                <input type="text" id="edit-item-img-url" value="${item.imageUrl || ''}" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-magenta-500 mb-2">
                <input type="file" id="edit-item-file" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-gray-400 file:mr-4 file:py-1 file:px-4 file:rounded-lg file:border-0 file:bg-magenta-500/20 file:text-magenta-400 file:cursor-pointer">
              </div>
            </div>
          `;
        }

        content.innerHTML = `
          ${fieldsHtml}
          <div class="pt-6 mt-6 border-t border-white/5">
            <button id="save-edit-btn" onclick="saveEdit()" class="btn-primary w-full py-4 rounded-xl font-bold uppercase tracking-wider transition-all hover:scale-[1.02]">
              <i class="fas fa-save mr-2"></i>Guardar Cambios
            </button>
          </div>
        `;
      } catch (err) {
        alert('Error al cargar datos');
      }
    }

    async function saveEdit() {
      const btn = document.getElementById('save-edit-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Guardando...';

      const { type, id, currentImageUrl } = editingItem;
      const file = document.getElementById('edit-item-file')?.files[0];
      
      let imageUrl = currentImageUrl;
      if (type === 'eventos') {
        imageUrl = document.getElementById('edit-item-img-url').value.trim();
      }

      // Handle file upload if present
      if (file) {
        const formData = new FormData();
        formData.append('file', file);
        try {
          const uploadRes = await fetch(CONFIG.API_URL + '/upload', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${getToken()}` },
            body: formData
          });
          if (uploadRes.ok) {
            const data = await uploadRes.json();
            imageUrl = data.url;
          }
        } catch (err) {
          console.error('Error uploading image:', err);
        }
      }

      const body = {
        title: document.getElementById('edit-item-title').value.trim(),
        description: document.getElementById('edit-item-desc').value.trim(),
        imageUrl
      };

      if (type === 'posts') {
        body.tags = document.getElementById('edit-item-tags').value.split(',').map(t => t.trim()).filter(Boolean);
      } else if (type === 'recursos') {
        body.type = document.getElementById('edit-item-type').value;
        body.url = document.getElementById('edit-item-url').value.trim();
        body.tags = document.getElementById('edit-item-tags').value.split(',').map(t => t.trim()).filter(Boolean);
      } else if (type === 'eventos') {
        body.date = document.getElementById('edit-item-date').value;
        body.location = document.getElementById('edit-item-location').value.trim();
      }

      try {
        const res = await apiRequest(`/${type}/${id}`, {
          method: 'PATCH',
          body: JSON.stringify(body)
        });

        if (res?.ok) {
          closeGlobalEdit();
          await loadProfile();
        } else {
          alert('Error al guardar cambios');
        }
      } catch (err) {
        alert('Error de conexión');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save mr-2"></i>Guardar Cambios';
      }
    }

    function closeGlobalEdit() {
      document.getElementById('global-edit-modal').classList.add('hidden');
      document.getElementById('global-edit-modal').classList.remove('flex');
    }

    async function deleteEvento(id) {
        if (!confirm('¿Estás seguro de que querés eliminar este evento?')) return;
        const res = await apiRequest(`/eventos/${id}`, { method: 'DELETE' });
        if (res?.ok) await loadProfile();
    }
  </script>

  <!-- Global Edit Modal -->
  <div id="global-edit-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 px-4 backdrop-blur-md">
    <div class="w-full max-w-lg rounded-3xl border border-white/10 card-cyber bg-[#0d0d12] p-8 relative">
      <button onclick="closeGlobalEdit()" class="absolute top-4 right-4 text-gray-400 hover:text-white">
        <i class="fas fa-times"></i>
      </button>
      <div id="edit-modal-content"></div>
    </div>
  </div>
</body>
</html>
