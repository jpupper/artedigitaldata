<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursos - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">
  <div id="app-header"></div>

  <main class="pt-20 pb-10 max-w-7xl mx-auto px-4">
    <section class="mb-10">
      <h1 class="text-3xl md:text-4xl font-black text-white mb-2">
        <i class="fas fa-box-open text-[var(--color-cyan)] mr-2"></i>Repositorio de Recursos
      </h1>
      <p class="text-gray-400">Software, links de GitHub, tutoriales y más para artistas digitales.</p>
    </section>

    <!-- Filter Buttons -->
    <div class="flex flex-wrap gap-2 mb-8">
      <button onclick="filterRecursos('all')" class="filter-btn active px-4 py-2 rounded-lg text-sm font-medium bg-cyan-500/20 text-[var(--color-cyan)] border border-cyan-500/30 hover:bg-cyan-500/30 transition-all">Todos</button>
      <button onclick="filterRecursos('software')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10 transition-all">Software</button>
      <button onclick="filterRecursos('github')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10 transition-all">GitHub</button>
      <button onclick="filterRecursos('drive')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10 transition-all">Drive</button>
      <button onclick="filterRecursos('tutorial')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10 transition-all">Tutoriales</button>
    </div>

    <!-- Recursos Grid -->
    <div id="recursos-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-full text-center text-gray-500 py-20">
        <i class="fas fa-spinner fa-spin text-3xl text-cyan-400 mb-4"></i>
        <p>Cargando recursos...</p>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script src="js/tagging.js"></script>
  <script>
    let allRecursos = [];
    const typeIcons = { software: 'fas fa-desktop', github: 'fab fa-github', drive: 'fab fa-google-drive', tutorial: 'fas fa-graduation-cap', other: 'fas fa-link' };
    const typeColors = { software: 'fuchsia', github: 'gray', drive: 'yellow', tutorial: 'green', other: 'orange' };

    document.addEventListener('DOMContentLoaded', async () => {
      await loadRecursos();
    });

    async function loadRecursos() {
      const container = document.getElementById('recursos-container');
      try {
        const res = await fetch(CONFIG.API_URL + '/recursos');
        allRecursos = await res.json();
        renderRecursos(allRecursos);
      } catch {
        container.innerHTML = `<div class="col-span-full text-center text-red-400 py-10"><i class="fas fa-exclamation-triangle mr-2"></i>Error cargando recursos</div>`;
      }
    }

    function filterRecursos(type) {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('bg-cyan-500/20', 'text-[var(--color-cyan)]', 'border-cyan-500/30');
        b.classList.add('bg-white/5', 'text-gray-400', 'border-white/10');
      });
      event.target.classList.add('bg-cyan-500/20', 'text-[var(--color-cyan)]', 'border-cyan-500/30');
      event.target.classList.remove('bg-white/5', 'text-gray-400', 'border-white/10');

      const filtered = type === 'all' ? allRecursos : allRecursos.filter(r => r.type === type);
      renderRecursos(filtered);
    }

    function renderRecursos(recursos) {
      const container = document.getElementById('recursos-container');
      if (!recursos.length) {
        container.innerHTML = `
          <div class="col-span-full text-center text-gray-500 py-20">
            <i class="fas fa-folder-open text-5xl text-cyan-400/30 mb-4"></i>
            <p class="text-xl">No hay recursos</p>
          </div>`;
        return;
      }

      container.innerHTML = recursos.map(r => `
        <div class="rounded-2xl border border-cyan-500/10 card-cyber transition-all duration-300 flex flex-col h-full group overflow-hidden">
          <a href="recurso.html?id=${r._id}" class="block flex-1 flex flex-col">
            ${r.imageUrl ? `
              <div class="aspect-video w-full overflow-hidden border-b border-white/5">
                <img src="${r.imageUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="${r.title}">
              </div>
            ` : `
              <div class="aspect-video w-full bg-white/5 flex items-center justify-center border-b border-white/5">
                <i class="${typeIcons[r.type] || typeIcons.other} text-4xl text-gray-700 opacity-30"></i>
              </div>
            `}
            <div class="p-6 flex-1 flex flex-col">
              <div class="flex items-start gap-4 mb-4">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center text-lg shrink-0 bg-${typeColors[r.type] || 'orange'}-500/20 text-${typeColors[r.type] || 'orange'}-400">
                  <i class="${typeIcons[r.type] || typeIcons.other}"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <h3 class="text-lg font-bold text-white group-hover:text-[var(--color-cyan)] transition-colors truncate">${r.title}</h3>
                  <p class="text-[10px] text-gray-500 uppercase tracking-wider font-bold">${r.type}</p>
                </div>
              </div>
              
              <p class="text-sm text-gray-400 line-clamp-2 mb-4">
                ${formatMentions(r.description)}
              </p>

              ${r.tags?.length ? `
                <div class="flex flex-wrap gap-1 mb-4">
                  ${r.tags.map(t => `<span class="px-2 py-0.5 rounded text-[9px] bg-white/5 text-gray-400 border border-white/10 uppercase tracking-tighter">${t}</span>`).join('')}
                </div>
              ` : ''}

              <div class="mt-auto pt-4 border-t border-white/5 flex items-center justify-between">
                <div class="flex items-center gap-2 text-xs text-gray-500">
                   <span class="font-medium text-cyan-400">@${r.author?.username || 'Anónimo'}</span>
                   <span class="opacity-30">•</span>
                   <span><i class="fas fa-comment mr-1"></i> ${r.comments?.length || 0}</span>
                </div>
                <i class="fas fa-arrow-right text-gray-600 group-hover:text-cyan-400 group-hover:translate-x-1 transition-all"></i>
              </div>
            </div>
          </a>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
