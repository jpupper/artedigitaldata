<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-messages { height: calc(100vh - 320px); }
    @media (max-width: 768px) { .chat-messages { height: calc(100vh - 380px); } }
    .msg-bubble { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen">
  <div id="app-header"></div>

  <main class="pt-20 pb-4 max-w-7xl mx-auto px-4 h-screen flex flex-col">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-black text-white">
        <i class="fas fa-comments text-[var(--color-magenta)] mr-2"></i>Chat en Vivo
      </h1>
      <div class="flex flex-wrap gap-2">
        <button onclick="showUsersModal()" class="px-4 py-2 rounded-xl text-xs sm:text-sm border border-cyan-500/30 text-cyan-400 hover:bg-cyan-500/10 transition-all font-bold">
          <i class="fas fa-users mr-1"></i>USERS
        </button>
        <button id="new-room-btn" onclick="showCreateRoom()" class="btn-primary px-4 py-2 rounded-xl text-xs sm:text-sm transition-all hover:scale-105 font-bold">
          <i class="fas fa-plus mr-1"></i>Nueva Sala
        </button>
      </div>
    </div>

    <div class="flex-1 flex gap-4 min-h-0 w-full overflow-hidden">
      <div id="rooms-panel" class="w-full md:w-80 shrink-0 rounded-2xl border border-cyan-500/20 overflow-hidden flex flex-col card-cyber bg-[#0d0d12]">
        <div class="flex border-b border-white/10">
          <button onclick="setTab('rooms')" id="tab-rooms" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider transition-all border-b-2 border-cyan-500 text-cyan-500">
            Salas
          </button>
          <button onclick="setTab('private')" id="tab-private" class="flex-1 py-3 text-xs font-bold uppercase tracking-wider transition-all border-b-2 border-transparent text-gray-500 hover:text-white">
            Mensajes
          </button>
        </div>
        
        <!-- Search User Area (shwon on private tab) -->
        <div id="search-container" class="hidden p-3 border-b border-white/10 bg-white/5">
          <div class="relative">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" id="user-search" placeholder="Buscar usuario..." 
              class="w-full bg-black/40 border border-white/10 rounded-lg pl-9 pr-3 py-2 text-xs text-white focus:outline-none focus:border-cyan-500 transition-all">
          </div>
          <div id="search-results" class="hidden absolute left-0 right-0 mt-2 mx-3 bg-gray-900 border border-white/10 rounded-xl overflow-hidden z-50 shadow-2xl">
            <!-- Results will be injected here -->
          </div>
        </div>

        <div id="rooms-list" class="flex-1 overflow-y-auto p-2 space-y-1">
          <div class="text-center text-gray-500 py-8 text-sm">Cargando salas...</div>
        </div>
      </div>

      <!-- Chat Area -->
      <div id="chat-area" class="hidden md:flex flex-1 flex-col rounded-2xl border border-cyan-500/20 overflow-hidden card-cyber bg-[#0d0d12] min-w-0">
        <div id="chat-header" class="p-4 border-b border-white/10 flex items-center gap-3">
          <button onclick="backToRooms()" class="md:hidden text-gray-400 hover:text-white">
            <i class="fas fa-arrow-left"></i>
          </button>
          <div>
            <h3 id="room-name" class="font-bold text-white">Selecciona una sala</h3>
            <p id="room-desc" class="text-xs text-gray-500"></p>
          </div>
        </div>
        <div id="messages-container" class="chat-messages flex-1 overflow-y-auto p-4 space-y-3">
          <div class="text-center text-gray-600 py-20">
            <i class="fas fa-comment-dots text-4xl text-cyan-400/30 mb-4"></i>
            <p>Seleccioná una sala para comenzar a chatear</p>
          </div>
        </div>
        <div id="chat-input-area" class="hidden p-4 border-t border-white/10">
          <form id="msg-form" class="flex gap-2">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..."
              class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-yellow-500 focus:outline-none transition-colors">
            <button type="submit" class="btn-primary px-5 py-3 rounded-xl transition-all hover:scale-105">
              <i class="fas fa-paper-plane"></i>
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Create Room Modal -->
    <div id="create-room-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-4">
      <div class="w-full max-w-md rounded-2xl p-6 border border-cyan-500/20 card-cyber">
        <h3 class="text-lg font-bold text-[var(--color-cyan)] mb-4">Crear Nueva Sala</h3>
        <form id="create-room-form" class="space-y-4">
          <input type="text" id="room-name-input" placeholder="Nombre de la sala" required
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-yellow-500 focus:outline-none transition-colors">
          <textarea id="room-desc-input" placeholder="Descripción (opcional)" rows="2"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-yellow-500 focus:outline-none transition-colors resize-none"></textarea>
          <div class="flex gap-3">
            <button type="submit" class="btn-primary px-6 py-3 rounded-xl flex-1">Crear</button>
            <button type="button" onclick="hideCreateRoom()" class="px-6 py-3 rounded-xl border border-white/10 text-gray-400 hover:text-white hover:bg-white/5 transition-all">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Users Directory Modal -->
    <div id="users-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 px-4 backdrop-blur-sm">
      <div class="w-full max-w-2xl rounded-3xl border border-white/10 card-cyber bg-[#0d0d12] flex flex-col max-h-[80vh]">
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
          <div>
            <h3 class="text-xl font-black text-white uppercase tracking-tighter">Directorio de <span class="text-cyan-400">Artistas</span></h3>
            <p class="text-xs text-gray-500">Conectá con otros miembros de la comunidad</p>
          </div>
          <button onclick="hideUsersModal()" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-gray-400 hover:bg-white/5 transition-all">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="users-modal-list" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Users will be injected here -->
          <div class="col-span-full text-center py-10">
            <i class="fas fa-circle-notch fa-spin text-2xl text-cyan-400"></i>
          </div>
        </div>
      </div>
    </div>

    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script>
    if (!isLoggedIn()) window.location.href = CONFIG.BASE + '/login.html';

    let socket;
    let currentRoomId = null;
    let currentTab = 'rooms'; // 'rooms' or 'private'
    const user = getUser();

    document.addEventListener('DOMContentLoaded', async () => {
      socket = io(CONFIG.SOCKET_URL, { path: CONFIG.SOCKET_PATH });

      socket.on('newMessage', (msg) => {
        if (msg.room === currentRoomId) {
          appendMessage(msg);
        } else {
          // If message is for another room, maybe show a notification if it's a DM
          if (currentTab === 'private') loadPrivateChats();
        }
      });

      await loadRooms();

      // User search logic
      const searchInput = document.getElementById('user-search');
      let searchTimeout;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        if (q.length < 2) {
          document.getElementById('search-results').classList.add('hidden');
          return;
        }
        searchTimeout = setTimeout(() => searchUsers(q), 300);
      });

      document.getElementById('msg-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        const content = input.value.trim();
        if (!content || !currentRoomId) return;

        socket.emit('chatMessage', { roomId: currentRoomId, senderId: user.id, content });
        input.value = '';
      });

      document.getElementById('create-room-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('room-name-input').value.trim();
        const description = document.getElementById('room-desc-input').value.trim();
        const res = await apiRequest('/chat/rooms', { method: 'POST', body: JSON.stringify({ name, description }) });
        if (res?.ok) {
          hideCreateRoom();
          await loadRooms();
        }
      });
    });

    function setTab(tab) {
      currentTab = tab;
      const tabRooms = document.getElementById('tab-rooms');
      const tabPrivate = document.getElementById('tab-private');
      const searchContainer = document.getElementById('search-container');
      
      if (tab === 'rooms') {
        tabRooms.classList.add('border-cyan-500', 'text-cyan-500');
        tabRooms.classList.remove('border-transparent', 'text-gray-500');
        tabPrivate.classList.remove('border-cyan-500', 'text-cyan-500');
        tabPrivate.classList.add('border-transparent', 'text-gray-500');
        searchContainer.classList.add('hidden');
        document.getElementById('new-room-btn').classList.remove('hidden');
        loadRooms();
      } else {
        tabPrivate.classList.add('border-cyan-500', 'text-cyan-500');
        tabPrivate.classList.remove('border-transparent', 'text-gray-500');
        tabRooms.classList.remove('border-cyan-500', 'text-cyan-500');
        tabRooms.classList.add('border-transparent', 'text-gray-500');
        searchContainer.classList.remove('hidden');
        document.getElementById('new-room-btn').classList.add('hidden');
        loadPrivateChats();
      }
    }

    async function searchUsers(q) {
      try {
        const res = await apiRequest(`/chat/users/search?q=${q}`);
        const users = await res.json();
        const results = document.getElementById('search-results');
        
        if (!users.length) {
          results.innerHTML = '<div class="p-4 text-center text-xs text-gray-400">No se encontraron usuarios</div>';
        } else {
          results.innerHTML = users.map(u => `
            <button onclick="startPrivateChat('${u._id}', '${u.username}')" class="w-full flex items-center gap-3 p-3 hover:bg-white/10 transition-all text-left border-b border-white/5 last:border-0">
              <img src="${u.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + u.username}" class="w-8 h-8 rounded-full border border-cyan-500/30">
              <span class="text-sm text-white font-medium">${u.username}</span>
            </button>
          `).join('');
        }
        results.classList.remove('hidden');
      } catch (err) {
        console.error('Error searching users:', err);
      }
    }

    async function startPrivateChat(recipientId, username) {
      document.getElementById('search-results').classList.add('hidden');
      document.getElementById('user-search').value = '';
      
      try {
        const res = await apiRequest('/chat/private', {
          method: 'POST',
          body: JSON.stringify({ recipientId })
        });
        const room = await res.json();
        if (room._id) {
          joinRoom(room._id, username, 'Chat Privado');
          loadPrivateChats();
        }
      } catch (err) {
        console.error('Error starting private chat:', err);
      }
    }

    async function loadPrivateChats() {
      const list = document.getElementById('rooms-list');
      try {
        const res = await apiRequest('/chat/private');
        const chats = await res.json();

        if (!chats.length) {
          list.innerHTML = '<div class="text-center text-gray-500 py-8 text-sm">No tienes mensajes privados aún. ¡Busca a alguien para chatear!</div>';
          return;
        }

        list.innerHTML = chats.map(c => {
          const otherUser = c.participants.find(p => p._id !== user.id);
          const name = otherUser?.username || 'Usuario';
          const avatar = otherUser?.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + name;
          return `
            <button onclick="joinRoom('${c._id}', '${name}', 'Chat Privado')"
              class="room-btn w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all flex items-center gap-3 ${currentRoomId === c._id ? 'border border-cyan-500/30 bg-cyan-500/10' : ''}">
              <img src="${avatar}" class="w-10 h-10 rounded-full border border-white/10">
              <div class="flex-1 min-w-0">
                <div class="font-medium text-white text-sm truncate">${name}</div>
                <div class="text-xs text-gray-500 truncate mt-0.5">Mensaje privado</div>
              </div>
            </button>
          `;
        }).join('');
      } catch (err) {
        list.innerHTML = '<div class="text-center text-red-400 py-4 text-sm">Error cargando mensajes</div>';
      }
    }

    async function loadRooms() {
      const list = document.getElementById('rooms-list');
      try {
        const res = await apiRequest('/chat/rooms');
        const rooms = await res.json();

        if (!rooms.length) {
          list.innerHTML = '<div class="text-center text-gray-500 py-8 text-sm">No hay salas aún. ¡Crea la primera!</div>';
          return;
        }

        list.innerHTML = rooms.map(r => `
          <button onclick="joinRoom('${r._id}', '${r.name}', '${r.description || ''}')"
            class="room-btn w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all ${currentRoomId === r._id ? 'border border-cyan-500/30 bg-cyan-500/10' : ''}">
            <div class="flex-1 min-w-0">
              <div class="font-bold text-white text-sm truncate">${r.name}</div>
              <div class="text-[10px] text-gray-500 truncate mt-0.5 uppercase tracking-wider">${r.creator?.username || 'Anónimo'}</div>
            </div>
          </button>
        `).join('');
      } catch {
        list.innerHTML = '<div class="text-center text-red-400 py-4 text-sm">Error cargando salas</div>';
      }
    }

    async function joinRoom(roomId, name, desc) {
      if (currentRoomId) socket.emit('leaveRoom', currentRoomId);
      currentRoomId = roomId;

      document.getElementById('room-name').textContent = name;
      document.getElementById('room-desc').textContent = desc;
      document.getElementById('chat-input-area').classList.remove('hidden');

      // Mobile: show chat, hide rooms
      document.getElementById('rooms-panel').classList.add('hidden', 'md:flex');
      document.getElementById('rooms-panel').classList.remove('flex');
      document.getElementById('chat-area').classList.remove('hidden');
      document.getElementById('chat-area').classList.add('flex');

      socket.emit('joinRoom', roomId);

      const container = document.getElementById('messages-container');
      container.innerHTML = '<div class="text-center text-gray-500 py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando mensajes...</div>';

      try {
        const res = await apiRequest(`/chat/rooms/${roomId}/messages`);
        const messages = await res.json();
        container.innerHTML = '';
        messages.forEach(appendMessage);
        container.scrollTop = container.scrollHeight;
      } catch {
        container.innerHTML = '<div class="text-center text-red-400 py-4">Error cargando mensajes</div>';
      }

      if (currentTab === 'rooms') await loadRooms();
      else await loadPrivateChats();
    }

    function appendMessage(msg) {
      const container = document.getElementById('messages-container');
      const isMe = msg.sender?._id === user.id || msg.sender === user.id;
      const senderName = msg.sender?.username || 'Anónimo';
      const senderAvatar = msg.sender?.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${senderName}`;
      const time = new Date(msg.createdAt).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

      const div = document.createElement('div');
      div.className = `msg-bubble flex w-full ${isMe ? 'justify-end' : 'justify-start'} mb-6`;
      
      div.innerHTML = `
        <div class="flex-1 w-full max-w-[98%] rounded-[2rem] px-6 py-4 shadow-2xl transition-all hover:scale-[1.01] ${isMe ? 'bg-cyan-500/10 border border-cyan-500/30' : 'bg-[#1a1a2e] border border-white/5'}">
          <div class="flex items-center gap-3 mb-3 border-b border-white/5 pb-2 ${isMe ? 'flex-row-reverse' : ''}">
            <img src="${senderAvatar}" class="w-8 h-8 rounded-xl border border-white/10 shadow-lg object-cover">
            <span class="text-sm font-black uppercase tracking-tighter ${isMe ? 'text-cyan-400' : 'text-magenta-400'}">
              ${isMe ? 'Tú' : senderName}
            </span>
          </div>
          <div class="text-sm sm:text-base text-white break-words whitespace-pre-wrap leading-relaxed opacity-90">${msg.content}</div>
          <div class="mt-3 flex items-center ${isMe ? 'justify-start' : 'justify-end'}">
            <span class="text-[10px] text-gray-500 font-mono opacity-40 uppercase tracking-widest">${time}</span>
          </div>
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function backToRooms() {
      document.getElementById('rooms-panel').classList.remove('hidden', 'md:flex');
      document.getElementById('rooms-panel').classList.add('flex');
      document.getElementById('chat-area').classList.add('hidden');
      document.getElementById('chat-area').classList.remove('flex');
    }

    function showCreateRoom() { document.getElementById('create-room-modal').classList.remove('hidden'); }
    function hideCreateRoom() { document.getElementById('create-room-modal').classList.add('hidden'); }

    async function showUsersModal() {
      const modal = document.getElementById('users-modal');
      const list = document.getElementById('users-modal-list');
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      try {
        const res = await apiRequest('/chat/users/all');
        const users = await res.json();
        
        list.innerHTML = users.map(u => `
          <div class="bg-white/5 border border-white/5 p-4 rounded-2xl flex items-center gap-4 hover:border-cyan-500/30 transition-all group">
            <img src="${u.avatar || 'https://api.dicebear.com/7.x/bottts/svg?seed=' + u.username}" 
                 class="w-12 h-12 rounded-xl object-cover border border-white/10 group-hover:border-cyan-500/50 transition-all">
            <div class="flex-1 min-w-0">
              <h4 class="font-bold text-white truncate">${u.displayName || u.username}</h4>
              <p class="text-[10px] text-gray-500 truncate">@${u.username}</p>
            </div>
            <div class="flex gap-2">
              <a href="profile.html?user=${u.username}" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-gray-400 hover:text-cyan-400 transition-all" title="Ver Perfil">
                <i class="fas fa-user text-xs"></i>
              </a>
              <button onclick="startDFromDirectory('${u._id}', '${u.username}')" 
                      class="w-8 h-8 rounded-lg bg-cyan-500/10 flex items-center justify-center text-cyan-400 hover:bg-cyan-500 hover:text-black transition-all" title="Enviar Mensaje">
                <i class="fas fa-comment-dots text-xs"></i>
              </button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        list.innerHTML = '<div class="col-span-full text-center text-red-500">Error al cargar artistas</div>';
      }
    }

    function hideUsersModal() {
      const modal = document.getElementById('users-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    async function startDFromDirectory(userId, username) {
      hideUsersModal();
      setTab('private');
      await startPrivateChat(userId, username);
    }

  </script>
</body>
</html>
