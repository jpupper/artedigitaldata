<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprar Entrada - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://sdk.mercadopago.com/js/v2"></script>
</head>
<body class="min-h-screen">
  <div id="app-header"></div>

  <main class="pt-24 pb-12 max-w-2xl mx-auto px-4">
    <!-- Loading -->
    <div id="loading" class="py-20 text-center">
      <i class="fas fa-spinner fa-spin text-4xl text-magenta-500 mb-4"></i>
      <p class="text-gray-500">Cargando información del evento...</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden py-20 text-center">
      <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-6"></i>
      <h2 class="text-2xl font-bold text-white mb-2">Error</h2>
      <p id="error-msg" class="text-gray-500 mb-8">No se pudo cargar el evento.</p>
      <a href="calendario.html" class="btn-primary px-8 py-3 rounded-xl">Volver al Calendario</a>
    </div>

    <!-- Content -->
    <div id="content" class="hidden">
      <!-- Event Summary -->
      <div class="rounded-3xl overflow-hidden border border-white/10 card-cyber bg-black/40 mb-6">
        <div id="event-image" class="aspect-video w-full bg-magenta-500/5 flex items-center justify-center">
          <!-- Image injected here -->
        </div>
        <div class="p-6">
          <h1 id="event-title" class="text-2xl font-black text-white mb-2"></h1>
          <div class="flex items-center gap-4 text-sm text-gray-400">
            <span id="event-date" class="flex items-center gap-2">
              <i class="fas fa-calendar text-magenta-500"></i>
              <!-- Date -->
            </span>
            <span id="event-location" class="flex items-center gap-2">
              <i class="fas fa-map-marker-alt text-cyan-500"></i>
              <!-- Location -->
            </span>
          </div>
        </div>
      </div>

      <!-- Purchase Form -->
      <div class="rounded-3xl border border-white/10 card-cyber bg-black/40 p-8">
        <h2 class="text-xl font-black text-white mb-6 flex items-center gap-3">
          <i class="fas fa-ticket-alt text-magenta-500"></i>
          <span id="form-title">Comprar Entrada</span>
        </h2>

        <!-- User info summary (read-only) -->
        <div id="buyer-summary" class="rounded-2xl bg-white/5 border border-white/10 px-5 py-4 mb-6 flex items-center gap-4">
          <div id="buyer-avatar" class="w-10 h-10 rounded-full bg-cyan-500/20 flex items-center justify-center text-cyan-400 font-black shrink-0 text-sm"></div>
          <div>
            <p id="buyer-display-name" class="text-white font-bold text-sm"></p>
            <p id="buyer-display-email" class="text-gray-400 text-xs"></p>
          </div>
        </div>

        <form id="purchase-form" class="space-y-6">
          <!-- Contribution amount for contribution events -->
          <div id="contribution-section" class="hidden">
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Monto de contribución (ARS)</label>
            <input type="number" id="contribution-amount" min="0" placeholder="Ingresá el monto"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-magenta-500 focus:outline-none transition-colors">
            <p class="text-[10px] text-gray-500 mt-1">Este es un evento con bono contribución. El monto es a tu elección.</p>
          </div>

          <div class="border-t border-white/10 pt-6">
            <div class="flex justify-between items-center mb-4">
              <span class="text-gray-400">Precio:</span>
              <span id="ticket-price" class="text-2xl font-black text-white"></span>
            </div>
            
            <div id="payment-container" class="hidden">
              <!-- MercadoPago button will be injected here -->
            </div>

            <button type="submit" id="submit-btn" class="w-full btn-primary py-4 rounded-2xl font-black text-lg hover:scale-[1.01] transition-transform">
              <i class="fas fa-lock mr-2"></i>
              <span id="btn-text">PROCEDER AL PAGO</span>
            </button>
          </div>
        </form>

        <!-- Status Overlay -->
        <div id="status-overlay" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md items-center justify-center z-[10000] p-4">
          <div class="text-center max-w-sm w-full">
            <div class="mb-6 flex justify-center">
              <div class="relative w-24 h-24">
                <div class="absolute inset-0 border-4 border-white/5 rounded-full"></div>
                <div id="status-spinner" class="absolute inset-0 border-4 border-t-magenta-500 rounded-full animate-spin"></div>
              </div>
            </div>
            <h2 id="status-title" class="text-3xl font-black text-white mb-2 uppercase tracking-tighter">Procesando...</h2>
            <p id="status-msg" class="text-gray-400">Generando tu entrada...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script>
    let currentEvent = null;
    let ticketCreated = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!isLoggedIn()) {
        showLogin();
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const eventId = urlParams.get('event');

      if (!eventId) {
        showError('No se especificó un evento');
        return;
      }

      await loadEvent(eventId);
    });

    async function loadEvent(eventId) {
      try {
        const res = await fetch(`${CONFIG.API_URL}/eventos/${eventId}`);
        if (!res.ok) throw new Error();
        const ev = await res.json();
        currentEvent = ev;
        renderEvent(ev);
      } catch (err) {
        showError('No se pudo cargar el evento');
      }
    }

    function renderEvent(ev) {
      document.getElementById('loading').classList.add('hidden');
      
      // Check if tickets are enabled
      if (!ev.ticketConfig?.enabled) {
        showError('Este evento no tiene sistema de entradas activado');
        return;
      }

      // Check if event is in the past
      const eventDate = new Date(ev.date);
      const now = new Date();
      if (eventDate < now) {
        showError('Este evento ya ha finalizado');
        return;
      }

      document.getElementById('content').classList.remove('hidden');
      document.title = `Comprar Entrada - ${ev.title}`;

      // Event image
      const imgContainer = document.getElementById('event-image');
      if (ev.imageUrl) {
        imgContainer.innerHTML = `<img src="${ev.imageUrl}" class="w-full h-full object-cover" alt="${ev.title}">`;
      } else {
        imgContainer.innerHTML = `<i class="fas fa-calendar-alt text-6xl text-magenta-500/20"></i>`;
      }

      document.getElementById('event-title').innerText = ev.title;
      document.getElementById('event-date').innerHTML = `<i class="fas fa-calendar text-magenta-500"></i> ${new Date(ev.date).toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' })}`;
      document.getElementById('event-location').innerHTML = `<i class="fas fa-map-marker-alt text-cyan-500"></i> ${ev.location || 'Virtual'}`;

      // Price display
      const priceDisplay = document.getElementById('ticket-price');
      const btnText = document.getElementById('btn-text');
      const formTitle = document.getElementById('form-title');
      
      if (ev.ticketConfig.isContribution) {
        priceDisplay.innerText = 'A TU ELECCIÓN';
        btnText.innerText = 'CONTRIBUIR Y RESERVAR';
        formTitle.innerText = 'Bono Contribución';
        const contribSection = document.getElementById('contribution-section');
        contribSection.classList.remove('hidden');
        // Pre-fill with event price as suggested default
        if (ev.ticketConfig.price > 0) {
          document.getElementById('contribution-amount').value = ev.ticketConfig.price;
        }
      } else if (ev.ticketConfig.price === 0) {
        priceDisplay.innerText = 'GRATIS';
        btnText.innerText = 'RESERVAR ENTRADA';
        formTitle.innerText = 'Reservar Entrada';
      } else {
        priceDisplay.innerText = `$${ev.ticketConfig.price} ARS`;
      }

      // Show logged-in user info
      const user = getUser();
      if (user) {
        const avatarEl = document.getElementById('buyer-avatar');
        if (user.avatar) {
          avatarEl.innerHTML = `<img src="${user.avatar}" class="w-full h-full object-cover rounded-full">`;
        } else {
          avatarEl.innerText = (user.displayName || user.username || '?')[0].toUpperCase();
        }
        document.getElementById('buyer-display-name').innerText = user.displayName || user.username || '';
        document.getElementById('buyer-display-email').innerText = user.email || '';
      }

      // Form submission
      document.getElementById('purchase-form').addEventListener('submit', handlePurchase);
    }

    async function handlePurchase(e) {
      e.preventDefault();
      
      const user = getUser();
      const name = user?.displayName || user?.username || '';
      const email = user?.email || '';
      const phone = '';

      try {
        // --- CONTRIBUTION MODE ---
        if (currentEvent.ticketConfig.isContribution) {
          const amount = parseFloat(document.getElementById('contribution-amount').value) || 0;

          if (amount > 0) {
            // Pay via MercadoPago with the chosen contribution amount
            showStatus('Procesando', 'Preparando el pago...');
            const prefHeaders = { 'Content-Type': 'application/json' };
            const prefToken = getToken();
            if (prefToken) prefHeaders['Authorization'] = `Bearer ${prefToken}`;
            const res = await fetch(`${CONFIG.API_URL}/tickets/event/${currentEvent._id}/create-preference`, {
              method: 'POST',
              headers: prefHeaders,
              body: JSON.stringify({ ownerName: name, ownerEmail: email, ownerPhone: phone, amount })
            });
            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.error || 'Error al crear preferencia de pago');
            }
            const data = await res.json();
            if (data.initPoint) {
              redirectToPayment(data);
            } else {
              throw new Error('No se pudo obtener el link de pago');
            }
          } else {
            // Amount is 0 — ask for confirmation
            const confirmed = confirm('¿Seguro que querés continuar sin contribuir?');
            if (!confirmed) return;
            showStatus('Procesando', 'Generando tu entrada...');
            await createFreeTicket(name, email, phone);
          }
          return;
        }

        // --- FREE EVENT ---
        if (currentEvent.ticketConfig.price === 0) {
          showStatus('Procesando', 'Generando tu entrada...');
          await createFreeTicket(name, email, phone);
          return;
        }

        // --- PAID EVENT (non-contribution) --- always go through MercadoPago
        showStatus('Procesando', 'Preparando el pago...');
        const paidHeaders = { 'Content-Type': 'application/json' };
        const paidToken = getToken();
        if (paidToken) paidHeaders['Authorization'] = `Bearer ${paidToken}`;
        const res = await fetch(`${CONFIG.API_URL}/tickets/event/${currentEvent._id}/create-preference`, {
          method: 'POST',
          headers: paidHeaders,
          body: JSON.stringify({ ownerName: name, ownerEmail: email, ownerPhone: phone })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Error al crear preferencia de pago');
        }

        const data = await res.json();
        if (data.initPoint) {
          redirectToPayment(data);
        } else {
          throw new Error('No se pudo obtener el link de pago');
        }

      } catch (err) {
        hideStatus();
        alert('Error: ' + err.message);
      }
    }

    function redirectToPayment(data) {
      if (data.usePaymentLink) {
        // Manual payment link: show the ticket immediately, open payment in new tab
        window.open(data.initPoint, '_blank');
        window.location.href = `ticket-success.html?ticket=${data.code}`;
      } else {
        // MercadoPago API preference: redirect entirely to MP checkout
        window.location.href = data.initPoint;
      }
    }

    async function createFreeTicket(name, email, phone) {
      const headers = { 'Content-Type': 'application/json' };
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;

      const res = await fetch(`${CONFIG.API_URL}/tickets/event/${currentEvent._id}/create-free`, {
        method: 'POST',
        headers,
        body: JSON.stringify({ ownerName: name, ownerEmail: email, ownerPhone: phone })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Error al crear la entrada');
      }

      const ticket = await res.json();
      window.location.href = `ticket-success.html?ticket=${ticket.code}`;
    }

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error-msg').innerText = msg;
    }

    function showStatus(title, msg) {
      const overlay = document.getElementById('status-overlay');
      document.getElementById('status-title').innerText = title;
      document.getElementById('status-msg').innerText = msg;
      overlay.classList.remove('hidden');
      overlay.classList.add('flex');
    }

    function hideStatus() {
      const overlay = document.getElementById('status-overlay');
      overlay.classList.add('hidden');
      overlay.classList.remove('flex');
    }
  </script>
</body>
</html>
