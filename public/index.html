<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arte Digital Data - Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen scrollbar-hide">
  <div id="app-header"></div>

  <main class="pt-20 pb-10 max-w-7xl mx-auto px-4">
    <!-- Hero Section -->
    <section class="mb-12 text-center py-16">
      <h1 class="text-4xl md:text-6xl font-black gradient-text mb-4 py-2">Arte Digital Data</h1>
      <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto">
        La red social para artistas digitales.
      </p>
      <div id="hero-cta" class="mt-8"></div>
    </section>

    <!-- Upcoming Events Preview -->
    <section class="mb-12">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-white"><i
            class="fas fa-calendar-alt text-[var(--color-magenta)] mr-2"></i>Próximos Eventos</h2>
        <a href="calendario.html" class="text-sm font-bold text-[var(--color-cyan)] hover:underline">Ver Calendario
          Completo <i class="fas fa-arrow-right ml-1"></i></a>
      </div>
      <div id="events-preview" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="col-span-full text-center py-10 bg-white/5 rounded-2xl border border-white/5">
          <p class="text-gray-500">Buscando eventos...</p>
        </div>
      </div>
    </section>

    <!-- Feed -->
    <section>
      <h2 class="text-2xl font-bold text-white mb-6"><i class="fas fa-fire text-[var(--color-magenta)] mr-2"></i>Feed
        Global</h2>
      <div id="feed-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-20">
          <i class="fas fa-spinner fa-spin text-3xl text-orange-400 mb-4"></i>
          <p>Cargando arte...</p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script src="js/tagging.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const heroCta = document.getElementById('hero-cta');
      if (!isLoggedIn()) {
        heroCta.innerHTML = `
          <a href="${CONFIG.BASE}/register.html" class="btn-primary inline-block text-black font-bold px-8 py-3 rounded-xl text-lg transition-all hover:scale-105">
            <i class="fas fa-rocket mr-2"></i>Únete Ahora
          </a>`;
      }
      await Promise.all([loadFeed(), loadEventsPreview()]);
    });

    async function loadFeed() {
      const container = document.getElementById('feed-container');
      try {
        const [postsRes, recursosRes, eventosRes] = await Promise.all([
          fetch(CONFIG.API_URL + '/posts'),
          fetch(CONFIG.API_URL + '/recursos'),
          fetch(CONFIG.API_URL + '/eventos')
        ]);
        
        const posts = await postsRes.json();
        const recursos = await recursosRes.json();
        const eventos = await eventosRes.json();
        
        // Merge and sort by date
        const allItems = [
          ...posts.map(p => ({ ...p, feedType: 'post' })),
          ...recursos.map(r => ({ ...r, feedType: 'recurso' })),
          ...eventos.map(e => ({ ...e, feedType: 'evento' }))
        ].sort((a, b) => new Date(b.createdAt || b.date) - new Date(a.createdAt || a.date));

        if (!allItems.length) {
          container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-20"><p class="text-xl">Aún no hay publicaciones</p></div>`;
          return;
        }

        container.innerHTML = allItems.map(item => {
          const type = item.feedType;
          const isPost = type === 'post';
          const isRecurso = type === 'recurso';
          const isEvento = type === 'evento';

          const link = isPost ? `${CONFIG.BASE}/post.html?id=${item._id}` : 
                       (isRecurso ? `${CONFIG.BASE}/recurso.html?id=${item._id}` : `${CONFIG.BASE}/evento.html?id=${item._id}`);
          
          const accentColor = isPost ? 'cyan' : (isRecurso ? 'orange' : 'magenta');
          const badgeText = isPost ? 'OBRA' : (isRecurso ? 'RECURSO' : 'EVENTO');
          const author = item.author || item.creator || { username: 'Anónimo' };
          const date = new Date(item.createdAt || item.date).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });

          return `
            <div class="group rounded-[2rem] overflow-hidden border border-white/5 bg-[#0d0d12]/60 hover:bg-[#0d0d12]/80 backdrop-blur-xl transition-all duration-500 hover:border-${accentColor}-500/30 hover:shadow-[0_0_40px_rgba(0,0,0,0.5)] flex flex-col h-full card-cyber">
              <!-- Image Container -->
              <a href="${link}" class="block aspect-video overflow-hidden relative">
                ${item.imageUrl ? `
                  <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                ` : `
                  <div class="w-full h-full bg-white/5 flex items-center justify-center">
                    <i class="fas fa-${isPost ? 'palette' : (isRecurso ? 'box-open' : 'calendar-alt')} text-3xl text-gray-700"></i>
                  </div>
                `}
                <div class="absolute top-4 right-4">
                   <span class="px-3 py-1 rounded-full text-[10px] font-black border border-${accentColor}-500/30 bg-black/60 text-${accentColor}-400 backdrop-blur-md uppercase tracking-widest">
                    ${badgeText}
                   </span>
                </div>
              </a>

              <!-- Content -->
              <div class="p-6 flex-1 flex flex-col">
                <!-- Author Header -->
                <div class="flex items-center justify-between mb-5">
                  <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl overflow-hidden border border-white/10 shrink-0 shadow-inner bg-white/5">
                      ${author.avatar ? `
                        <img src="${author.avatar}" alt="${author.username}" class="w-full h-full object-cover">
                      ` : `
                        <div class="w-full h-full flex items-center justify-center text-xs font-bold bg-white/5 text-gray-500">
                          ${(author.username || '?')[0].toUpperCase()}
                        </div>
                      `}
                    </div>
                    <div>
                      <a href="${CONFIG.BASE}/profile.html?user=${author.username}" class="block text-sm font-bold text-white hover:text-${accentColor}-400 transition-colors">
                        ${author.username}
                      </a>
                      <span class="text-[10px] text-gray-500 font-medium uppercase tracking-tighter">${date}</span>
                    </div>
                  </div>
                </div>

                <!-- Info -->
                <div class="flex-1">
                  <h3 class="text-xl font-black text-white mb-2 leading-tight group-hover:text-${accentColor}-400 transition-colors line-clamp-1">
                    ${item.title}
                  </h3>
                  <p class="text-gray-400 text-sm mb-4 line-clamp-2 leading-relaxed">
                    ${formatMentions(item.description)}
                  </p>
                </div>

                <!-- Footer -->
                <div class="flex items-center justify-between pt-4 border-t border-white/5">
                  <div class="flex items-center gap-4">
                    <button onclick="toggleFeedLike(event, '${item._id}', '${item.feedType}')" class="flex items-center gap-1.5 text-xs font-bold transition-colors ${(item.likes || []).includes(getUserId()) ? 'text-red-500' : 'text-gray-500 hover:text-cyan-400'}">
                      <i class="${(item.likes || []).includes(getUserId()) ? 'fas' : 'far'} fa-heart"></i> 
                      <span class="like-count">${item.likes?.length || 0}</span>
                    </button>
                    <a href="${link}" class="flex items-center gap-1.5 text-xs text-gray-500 font-bold hover:text-magenta-400 transition-colors">
                      <i class="fas fa-comment"></i> ${item.comments?.length || 0}
                    </a>
                  </div>
                  <a href="${link}" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-white hover:bg-${accentColor}-500 hover:text-black transition-all">
                    <i class="fas fa-arrow-right text-xs"></i>
                  </a>
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="col-span-full text-center text-red-500 py-10">Error cargando el feed</div>`;
      }
    }

    async function loadEventsPreview() {
      const container = document.getElementById('events-preview');
      try {
        const res = await fetch(CONFIG.API_URL + '/eventos');
        const allEvents = await res.json();
        const upcoming = allEvents.filter(e => new Date(e.date) >= new Date()).slice(0, 3);
        if (!upcoming.length) {
          container.innerHTML = `<div class="col-span-full text-center py-8 text-gray-500 italic">No hay eventos próximos.</div>`;
          return;
        }
        container.innerHTML = upcoming.map(ev => `
          <a href="evento.html?id=${ev._id}" target="_blank" class="block group">
            <div class="rounded-2xl border border-white/5 bg-white/5 p-4 hover:border-magenta-500/30 transition-all">
              <div class="flex items-center gap-3 mb-3">
                <span class="px-2 py-1 bg-magenta-500/20 text-magenta-400 rounded-lg text-[10px] font-bold">
                  ${new Date(ev.date).toLocaleDateString('es-AR', { day: '2-digit', month: 'short' })}
                </span>
                <h3 class="font-bold text-white truncate">${ev.title}</h3>
              </div>
              <p class="text-xs text-gray-400 line-clamp-2">${formatMentions(ev.description)}</p>
            </div>
          </a>
        `).join('');
      } catch (err) {
        container.innerHTML = '';
      }
    }

    async function toggleFeedLike(event, id, type) {
      event.preventDefault();
      if (!isLoggedIn()) {
        alert('Inicia sesión para dar like');
        return;
      }
      
      const endpoint = type === 'post' ? `/posts/${id}/like` : 
                       (type === 'recurso' ? `/recursos/${id}/like` : `/eventos/${id}/like`);
      const btn = event.currentTarget;
      const icon = btn.querySelector('i');
      const countSpan = btn.querySelector('.like-count');
      
      try {
        const res = await apiRequest(endpoint, { method: 'POST' });
        if (res.ok) {
          const data = await res.json();
          const userId = getUserId();
          const isLiked = data.likes.includes(userId);
          
          icon.className = `${isLiked ? 'fas' : 'far'} fa-heart`;
          btn.className = `flex items-center gap-1.5 text-xs font-bold transition-colors ${isLiked ? 'text-red-500' : 'text-gray-500 hover:text-cyan-400'}`;
          countSpan.innerText = data.likes.length;
        }
      } catch (err) {
        console.error(err);
      }
    }
  </script>
</body>

</html>
