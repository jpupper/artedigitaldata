<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arte Digital Data - Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen scrollbar-hide">
  <div id="app-header"></div>

  <main class="pt-20 pb-10 max-w-7xl mx-auto px-4">
    <!-- Hero Section -->
    <section class="mb-6 text-center pt-8 pb-4">
      <h1 class="text-4xl md:text-5xl font-black gradient-text mb-2">Arte Digital Data</h1>
      <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto">
        La red social para artistas digitales.
      </p>
      <div id="hero-cta"></div>
    </section>

    <!-- Feed Filters -->
    <section class="mb-8">
      <div class="flex flex-wrap items-center justify-center gap-4">
        <button onclick="toggleFilter('post')" id="filter-post" class="filter-switch px-6 py-2 rounded-full border border-white/10 bg-white/5 text-gray-500 font-black text-xs uppercase tracking-widest transition-all hover:border-cyan-500/50">
          <i class="fas fa-palette mr-2"></i>Obras
        </button>
        <button onclick="toggleFilter('recurso')" id="filter-recurso" class="filter-switch px-6 py-2 rounded-full border border-white/10 bg-white/5 text-gray-500 font-black text-xs uppercase tracking-widest transition-all hover:border-orange-500/50">
          <i class="fas fa-box-open mr-2"></i>Recursos
        </button>
        <button onclick="toggleFilter('evento')" id="filter-evento" class="filter-switch px-6 py-2 rounded-full border border-white/10 bg-white/5 text-gray-500 font-black text-xs uppercase tracking-widest transition-all hover:border-magenta-500/50">
          <i class="fas fa-calendar-alt mr-2"></i>Eventos
        </button>
      </div>
    </section>

    <!-- Pinned Events Section -->
    <section id="pinned-section" class="mb-12 hidden">
      <h2 class="text-2xl font-bold text-white mb-6">
        <i class="fas fa-thumbtack text-[var(--color-cyan)] mr-2"></i>Pins Destacados
      </h2>
      <div id="pinned-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </section>

    <!-- Feed -->
    <section>
      <h2 class="text-2xl font-bold text-white mb-6">
        <i class="fas fa-fire text-[var(--color-magenta)] mr-2"></i>Feed Global
      </h2>
      <div id="feed-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="col-span-full text-center text-gray-500 py-20">
          <i class="fas fa-spinner fa-spin text-3xl text-orange-400 mb-4"></i>
          <p>Cargando arte...</p>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/header.js"></script>
  <script src="js/tagging.js"></script>
  <script src="js/index.js"></script>
</body>

</html>
