<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>

  <main class="flex-1 flex items-center justify-center pt-20 pb-10 px-4">
    <div class="w-full max-w-md rounded-2xl p-8 border border-cyan-500/20 card-cyber">
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center font-black text-2xl mb-4 bg-cyan-500/10">
          <i class="fas fa-key text-cyan-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">Recuperar Contraseña</h1>
        <p class="text-gray-400 text-sm mt-2">Ingresá tu email y te enviaremos un link para restablecer tu cuenta.</p>
      </div>

      <form id="forgot-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Correo Electrónico</label>
          <input type="email" id="forgot-email" required
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:border-[var(--color-cyan)] focus:outline-none transition-colors"
            placeholder="ejemplo@correo.com">
        </div>
        
        <div id="forgot-message" class="hidden text-sm text-center rounded-lg p-3"></div>
        
        <button type="submit" id="submit-btn" class="btn-primary w-full py-3 rounded-xl transition-all hover:scale-[1.02]">
          <i class="fas fa-paper-plane mr-2"></i>Enviar Link
        </button>
      </form>

      <p class="text-center text-gray-500 text-sm mt-6">
        <a href="login.html" class="text-[var(--color-cyan)] hover:text-[var(--color-magenta)] font-medium transition-colors">Volver al Login</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value;
      const msgEl = document.getElementById('forgot-message');
      const btn = document.getElementById('submit-btn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Enviando...';
      msgEl.classList.add('hidden');

      try {
        const res = await fetch(CONFIG.API_URL + '/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();
        
        msgEl.textContent = data.message || data.error;
        msgEl.classList.remove('hidden');
        
        if (res.ok) {
          msgEl.className = 'text-green-400 text-sm text-center bg-green-500/10 rounded-lg p-3';
          document.getElementById('forgot-form').reset();
        } else {
          msgEl.className = 'text-red-400 text-sm text-center bg-red-500/10 rounded-lg p-3';
        }
      } catch (err) {
        msgEl.textContent = 'Error de conexión';
        msgEl.className = 'text-red-400 text-sm text-center bg-red-500/10 rounded-lg p-3';
        msgEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Enviar Link';
      }
    });
  </script>
</body>
</html>
