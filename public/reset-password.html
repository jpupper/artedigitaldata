<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña - Arte Digital Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex flex-col">
  <div id="app-header"></div>

  <main class="flex-1 flex items-center justify-center pt-20 pb-10 px-4">
    <div class="w-full max-w-md rounded-2xl p-8 border border-cyan-500/20 card-cyber">
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto bg-fuchsia-500/10 rounded-2xl flex items-center justify-center font-black text-2xl mb-4">
          <i class="fas fa-lock text-magenta-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">Nueva Contraseña</h1>
        <p class="text-gray-400 text-sm mt-2">Ingresá tu nueva contraseña para volver a ingresar.</p>
      </div>

      <form id="reset-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Nueva Contraseña</label>
          <input type="password" id="reset-pass" required minlength="6"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:border-[var(--color-cyan)] focus:outline-none transition-colors"
            placeholder="••••••••">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Confirmar Contraseña</label>
          <input type="password" id="reset-confirm" required minlength="6"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:border-[var(--color-cyan)] focus:outline-none transition-colors"
            placeholder="••••••••">
        </div>
        
        <div id="reset-message" class="hidden text-sm text-center rounded-lg p-3"></div>
        
        <button type="submit" id="submit-btn" class="btn-primary w-full py-3 rounded-xl transition-all hover:scale-[1.02]">
          <i class="fas fa-check mr-2"></i>Actualizar Contraseña
        </button>
      </form>

      <p class="text-center text-gray-500 text-sm mt-6">
        <a href="login.html" class="text-[var(--color-cyan)] hover:text-[var(--color-magenta)] font-medium">Volver al Login</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('reset-form').innerHTML = '<div class="text-red-400 text-center p-4 bg-red-500/10 rounded-xl">Token de recuperación faltante o inválido.</div>';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('reset-pass').value;
      const confirm = document.getElementById('reset-confirm').value;
      const msgEl = document.getElementById('reset-message');
      const btn = document.getElementById('submit-btn');

      if (password !== confirm) {
        msgEl.textContent = 'Las contraseñas no coinciden';
        msgEl.className = 'text-red-400 text-sm text-center bg-red-500/10 rounded-lg p-3';
        msgEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Actualizando...';
      msgEl.classList.add('hidden');

      try {
        const res = await fetch(CONFIG.API_URL + '/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();
        
        msgEl.textContent = data.message || data.error;
        msgEl.classList.remove('hidden');
        
        if (res.ok) {
          msgEl.className = 'text-green-400 text-sm text-center bg-green-500/10 rounded-lg p-3';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          msgEl.className = 'text-red-400 text-sm text-center bg-red-500/10 rounded-lg p-3';
        }
      } catch (err) {
        msgEl.textContent = 'Error de conexión';
        msgEl.className = 'text-red-400 text-sm text-center bg-red-500/10 rounded-lg p-3';
        msgEl.classList.remove('hidden');
      } finally {
        if (!res?.ok) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check mr-2"></i>Actualizar Contraseña';
        }
      }
    });
  </script>
</body>
</html>
