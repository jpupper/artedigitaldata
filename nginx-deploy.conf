# Configuración de NGINX para Arte Digital Data (artedigitaldata)
# Basado en la plantilla proporcionada, adaptado al puerto y ruta del proyecto actual.

# APLICACIÓN: artedigitaldata (puerto 2495)
location /artedigitaldata {
    # Proxy a Node.js (El servidor Node ya maneja el prefijo /artedigitaldata)
    proxy_pass http://localhost:2495;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # Ajustes adicionales para Socket.io (opcional pero recomendado)
    proxy_read_timeout 86400;
}
